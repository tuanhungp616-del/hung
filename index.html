<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v8.0 – VIP PRO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 15px;
      color: #fff;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    .glass {
      background: rgba(10, 10, 20, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      padding: 30px 25px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
      margin-bottom: 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid cyan;
      box-shadow: 0 0 25px cyan;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    h1 {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, cyan, magenta);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      margin: 10px 0 5px;
    }
    .subtitle {
      text-align: center;
      color: gold;
      font-size: 0.8rem;
      letter-spacing: 4px;
      margin-bottom: 25px;
    }
    .input-field {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: 0.3s;
    }
    .input-field:focus {
      border-color: magenta;
      box-shadow: 0 0 20px magenta;
    }
    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, cyan, magenta);
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: 'Orbitron', sans-serif;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 25px cyan;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:hover {
      box-shadow: 0 0 40px magenta;
      transform: translateY(-3px);
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 18px;
      margin: 12px 0;
      cursor: pointer;
      transition: 0.3s;
    }
    .card:hover {
      border-color: cyan;
      box-shadow: 0 0 25px rgba(0,255,255,0.3);
      transform: scale(1.02);
    }
    .card h3 {
      font-size: 1.3rem;
      margin-bottom: 5px;
    }
    .card p {
      color: #aaa;
      font-size: 0.8rem;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      display: none;
      flex-direction: column;
      z-index: 100;
    }
    .overlay.active {
      display: flex;
    }
    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }
    .overlay-header i {
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .overlay-header i:hover { color: cyan; }
    .dropdown {
      position: relative;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0; top: 40px;
      background: #1a1a2e;
      min-width: 200px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 200;
      overflow: hidden;
    }
    .dropdown-content a {
      color: #fff;
      padding: 14px 20px;
      text-decoration: none;
      display: block;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
    }
    .dropdown-content a:hover {
      background: cyan;
      color: #000;
    }
    .show { display: block; }
    .result-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .prediction {
      font-size: 9rem;
      font-weight: 900;
      line-height: 1;
      margin: 20px 0;
      text-shadow: 0 0 30px currentColor;
      animation: pulse 2s infinite;
    }
    .tai { color: #ff3366; }
    .xiu { color: #00ccff; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .info-row {
      font-size: 1rem;
      margin: 5px 0;
      color: #ccc;
    }
    .reverse-badge {
      background: gold;
      color: #000;
      padding: 4px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      margin-top: 10px;
    }
    .history-box {
      width: 100%;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 10px;
      margin-top: 20px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
      font-family: 'Orbitron', sans-serif;
    }
    .history-item:last-child { border-bottom: none; }
    .win { color: #4caf50; } .lose { color: #ff3366; }
  </style>
</head>
<body>
<div class="container">
  <!-- Login Screen -->
  <div class="glass" id="loginScreen">
    <div class="logo">
      <img src="https://i.ibb.co/QFDKgC1R/1783519521054.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616438.png'">
    </div>
    <h1>DORAEMON AI</h1>
    <div class="subtitle">VIP PRO v8.0</div>
    <input type="text" id="username" class="input-field" placeholder="TÊN ĐĂNG NHẬP">
    <input type="password" id="password" class="input-field" placeholder="MẬT KHẨU">
    <button class="btn" onclick="login()"><i class="fas fa-fingerprint"></i> MỞ KHÓA</button>
    <p id="loginError" style="color:red; text-align:center; margin-top:15px;"></p>
  </div>

  <!-- Dashboard -->
  <div class="glass" id="dashboard" style="display:none;">
    <h2 id="welcome" style="text-align:center; margin-bottom:25px; font-size:1.5rem;"></h2>
    <div class="card" onclick="openGame('lc79')">
      <h3><i class="fas fa-crown" style="color:gold;"></i> LC79.BET</h3>
      <p>Chạm để chọn chế độ</p>
    </div>
    <div class="card" onclick="openGame('betvip')">
      <h3><i class="fas fa-gem" style="color:cyan;"></i> BETVIP</h3>
      <p>Chạm để chọn chế độ</p>
    </div>
    <div class="card" onclick="openGame('sunwin')">
      <h3><i class="fas fa-sun" style="color:orange;"></i> SUNWIN</h3>
      <p>Chạm để chọn chế độ</p>
    </div>
    <button class="btn" style="background:red; margin-top:20px;" onclick="logout()">ĐĂNG XUẤT</button>
  </div>
</div>

<!-- Game Overlay -->
<div class="overlay" id="gameOverlay">
  <div class="overlay-header">
    <i class="fas fa-chevron-left" onclick="closeGame()"></i>
    <span id="gameTitle" style="font-size:1.3rem; font-weight:700;"></span>
    <div class="dropdown">
      <i class="fas fa-ellipsis-v" onclick="document.getElementById('modeMenu').classList.toggle('show')"></i>
      <div class="dropdown-content" id="modeMenu">
        <a href="#" onclick="selectMode('tx_md5')">🎯 TÀI XỈU MD5</a>
        <a href="#" onclick="selectMode('tx_hu')">🎰 TÀI XỈU HŨ</a>
        <a href="#" onclick="selectMode('xoc_dia')">🎲 XÓC ĐĨA</a>
      </div>
    </div>
  </div>
  <div class="result-area">
    <div id="modeDisplay" style="margin-bottom:20px; color:#aaa;">Chọn chế độ từ menu</div>
    <div id="loading" style="display:none;"><i class="fas fa-spinner fa-pulse fa-2x"></i></div>
    <div id="resultBox" style="display:none; text-align:center;">
      <div style="font-size:0.9rem; color:#aaa;">DỰ ĐOÁN</div>
      <div class="prediction" id="predictionText"></div>
      <div class="info-row">Phiên: <span id="sessionId" style="color:#fff;"></span></div>
      <div class="info-row">Độ chính xác: <span id="accuracy" style="color:#fff;"></span>%</div>
      <div id="reason" style="color:gold; margin-top:8px; font-size:0.8rem;"></div>
      <div id="reverseBadge" class="reverse-badge" style="display:none;">🔄 ĐẢO CẦU</div>
    </div>
    <div class="history-box">
      <div style="margin-bottom:8px; font-weight:700;">📜 LỊCH SỬ DỰ ĐOÁN</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
let auth = false, currentTool = '', currentMode = '', interval = null;

async function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('loginError');
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const data = await res.json();
    if (data.status === 'success') {
      auth = true;
      document.getElementById('welcome').innerText = `XIN CHÀO, ${data.data.name.toUpperCase()}`;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      err.innerText = '';
    } else err.innerText = data.msg;
  } catch(e) { err.innerText = 'Lỗi kết nối'; }
}

function logout() {
  auth = false;
  clearInterval(interval);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('gameOverlay').classList.remove('active');
}

function openGame(tool) {
  if (!auth) return;
  currentTool = tool;
  document.getElementById('gameTitle').innerText = tool.toUpperCase();
  document.getElementById('gameOverlay').classList.add('active');
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('modeDisplay').innerText = 'Chọn chế độ từ menu 3 chấm';
  clearInterval(interval);
  loadHistory();
}

function closeGame() {
  document.getElementById('gameOverlay').classList.remove('active');
  clearInterval(interval);
}

function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeMenu').classList.remove('show');
  document.getElementById('modeDisplay').innerText = `Chế độ: ${mode.replace('_', ' ').toUpperCase()}`;
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  fetchPrediction();
  clearInterval(interval);
  interval = setInterval(fetchPrediction, 5000);
}

async function fetchPrediction() {
  if (!currentTool || !currentMode) return;
  try {
    const res = await fetch(`/api/scan?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    if (data.status === 'success') {
      const d = data.data;
      const pred = d.du_doan;
      document.getElementById('predictionText').innerText = pred;
      document.getElementById('predictionText').className = 'prediction ' + (pred.includes('TÀI') ? 'tai' : 'xiu');
      document.getElementById('sessionId').innerText = d.phien;
      document.getElementById('accuracy').innerText = d.ti_le;
      document.getElementById('reason').innerText = d.loi_khuyen || '';
      document.getElementById('reverseBadge').style.display = d.reverse_mode ? 'inline-block' : 'none';
      document.getElementById('resultBox').style.display = 'block';
      loadHistory();
    }
  } catch(e) {
    document.getElementById('loading').innerHTML = '⚠️ Lỗi kết nối';
  }
}

async function loadHistory() {
  try {
    const res = await fetch(`/api/history?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
    const data = await res.json();
    const container = document.getElementById('historyList');
    container.innerHTML = '';
    if (data.length === 0) {
      container.innerHTML = '<div style="text-align:center; color:gray;">Chưa có dữ liệu</div>';
      return;
    }
    data.reverse().forEach(item => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <span>#${item.phien}</span>
        <span>${item.du_doan}</span>
        <span class="${item.win ? 'win' : 'lose'}">${item.win ? '✅ Thắng' : '❌ Thua'}</span>
      `;
      container.appendChild(div);
    });
  } catch(e) {}
}

window.addEventListener('click', function(e) {
  if (!e.target.matches('.fa-ellipsis-v')) {
    document.getElementById('modeMenu').classList.remove('show');
  }
});
</script>
</body>
        </html>
