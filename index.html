<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v12.0 – MINI WIDGET</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: radial-gradient(circle at 50% 0%, #0a0015 0%, #000 100%);
      font-family: 'Orbitron', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 15px;
      color: #fff;
      overflow: hidden; /* để không bị cuộn khi kéo widget */
    }
    .container { width: 100%; max-width: 450px; }
    .glass {
      background: rgba(15, 10, 30, 0.8);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(0, 255, 255, 0.35);
      border-radius: 35px;
      padding: 30px 20px;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.08);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,255,255,0.1) 0%, transparent 60%);
      animation: rotate 10s linear infinite;
      z-index: -1;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    .logo { text-align: center; margin-bottom: 20px; }
    .logo img {
      width: 110px; height: 110px; border-radius: 50%; border: 3px solid cyan;
      box-shadow: 0 0 35px cyan; animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    h1 {
      text-align: center; font-size: 2.3rem; font-weight: 900;
      background: linear-gradient(90deg, #0ff, #f0f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 3px; margin: 10px 0 5px;
    }
    .subtitle {
      text-align: center; color: gold; font-size: 0.8rem; letter-spacing: 5px;
      margin-bottom: 15px; text-transform: uppercase;
    }
    .golden-hour-box {
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid gold;
      border-radius: 20px;
      padding: 12px 20px;
      margin: 0 0 25px;
      text-align: center;
    }
    .golden-hour-box i { color: gold; margin-right: 8px; }
    .input-field {
      width: 100%; padding: 16px; margin: 10px 0; background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; color: #fff;
      font-family: 'Orbitron', sans-serif; font-size: 0.9rem; outline: none; transition: 0.3s;
    }
    .input-field:focus { border-color: magenta; box-shadow: 0 0 25px magenta; }
    .btn {
      width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #0ff, #f0f); color: #000; font-weight: 700;
      font-size: 1.1rem; font-family: 'Orbitron', sans-serif; cursor: pointer;
      text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 30px cyan;
      transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:hover { box-shadow: 0 0 50px magenta; transform: translateY(-3px); }
    .card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 18px; margin: 12px 0; cursor: pointer; transition: 0.3s;
    }
    .card:hover { border-color: cyan; box-shadow: 0 0 30px rgba(0,255,255,0.3); transform: scale(1.02); }

    /* Overlay toàn màn hình khi mở rộng */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); display: none; flex-direction: column; z-index: 100;
    }
    .overlay.active { display: flex; }
    .overlay-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px; background: rgba(0,0,0,0.6);
    }
    .overlay-header i { font-size: 1.5rem; cursor: pointer; }
    .dropdown { position: relative; }
    .dropdown-content {
      display: none; position: absolute; right: 0; top: 45px; background: #1a0a30;
      min-width: 200px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.9);
      z-index: 200; overflow: hidden;
    }
    .dropdown-content a {
      color: #fff; padding: 14px 20px; display: block; font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
    }
    .dropdown-content a:hover { background: cyan; color: #000; }
    .show { display: block; }

    /* Floating Widget (Mini) */
    .floating-widget {
      position: fixed;
      bottom: 30px;
      right: 20px;
      width: 200px;
      background: rgba(15, 10, 30, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid cyan;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,255,255,0.4);
      z-index: 300;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 15px 10px;
      cursor: grab;
      user-select: none;
      transition: opacity 0.2s;
    }
    .floating-widget:active { cursor: grabbing; }
    .floating-widget .widget-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid cyan;
      margin-bottom: 8px;
      box-shadow: 0 0 15px cyan;
      background: #000;
    }
    .floating-widget .widget-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .floating-widget .widget-prediction {
      font-size: 1.3rem;
      font-weight: 900;
      margin: 5px 0;
    }
    .floating-widget .widget-buttons {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }
    .floating-widget .widget-buttons i {
      font-size: 1.2rem;
      color: #fff;
      background: rgba(255,255,255,0.1);
      padding: 6px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
    }
    .floating-widget .widget-buttons i:hover { color: cyan; }

    /* Minimize button trong overlay */
    .minimize-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- LOGIN & DASHBOARD (giữ nguyên như trước) -->
<div class="container">
  <div class="glass" id="loginScreen">
    <!-- Nội dung login như cũ -->
  </div>
  <div class="glass" id="dashboard" style="display:none;">
    <!-- Danh sách sàn game -->
  </div>
</div>

<!-- OVERLAY TOÀN MÀN HÌNH (có thêm nút thu nhỏ) -->
<div class="overlay" id="gameOverlay">
  <div class="overlay-header">
    <i class="fas fa-chevron-left" onclick="closeGame()"></i>
    <span id="gameTitle" style="font-size:1.3rem; font-weight:700;"></span>
    <div style="display:flex; gap:15px; align-items:center;">
      <button class="minimize-btn" onclick="minimizeWidget()"><i class="fas fa-window-minimize"></i></button>
      <div class="dropdown">
        <i class="fas fa-ellipsis-v" onclick="document.getElementById('modeMenu').classList.toggle('show')"></i>
        <div class="dropdown-content" id="modeMenu">
          <a href="#" onclick="selectMode('tx_md5')">🎯 TÀI XỈU MD5</a>
          <a href="#" onclick="selectMode('tx')">🎰 TÀI XỈU HŨ</a>
          <a href="#" onclick="selectMode('xoc_dia')">🎲 XÓC ĐĨA</a>
        </div>
      </div>
    </div>
  </div>
  <div class="result-area" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div class="cooldown-banner" id="cooldownBanner">...</div>
    <div id="modeDisplay" style="margin-bottom:20px; color:#aaa;">Chọn chế độ từ menu</div>
    <div id="loading" style="display:none;"><i class="fas fa-spinner fa-pulse fa-2x"></i></div>
    <div id="resultBox" style="display:none; text-align:center;">
      <div class="prediction" id="predictionText"></div>
      <div class="info-row">...</div>
    </div>
    <div class="last-history" id="lastHistoryBox">...</div>
    <div class="manual-md5-box">...</div>
  </div>
</div>

<!-- FLOATING WIDGET MINI -->
<div class="floating-widget" id="floatingWidget">
  <div class="widget-avatar">
    <img src="https://i.ibb.co/QFDKgC1R/1783519521054.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616438.png'">
  </div>
  <div class="widget-prediction" id="widgetPrediction">--</div>
  <div style="font-size:0.7rem; color:#aaa;" id="widgetSession">Phiên: --</div>
  <div class="widget-buttons">
    <i class="fas fa-ellipsis-v" onclick="toggleWidgetMenu()"></i>
    <i class="fas fa-expand" onclick="maximizeWidget()"></i>
    <i class="fas fa-times" onclick="closeWidget()"></i>
  </div>
  <!-- Dropdown nhỏ cho widget -->
  <div class="dropdown-content" id="widgetModeMenu" style="right:50px; bottom:60px; display:none;">
    <a href="#" onclick="selectMode('tx_md5'); toggleWidgetMenu();">🎯 TX MD5</a>
    <a href="#" onclick="selectMode('tx'); toggleWidgetMenu();">🎰 TX HŨ</a>
    <a href="#" onclick="selectMode('xoc_dia'); toggleWidgetMenu();">🎲 XÓC ĐĨA</a>
  </div>
</div>

<script>
// Các biến toàn cục (giống như trước, thêm một số hàm cho widget)
let auth = false, currentTool = '', currentMode = '', interval = null;
let cooldownActive = false, cooldownTimerId = null;

// --- DRAG & DROP WIDGET ---
const widget = document.getElementById('floatingWidget');
let isDragging = false, offsetX, offsetY;

widget.addEventListener('mousedown', (e) => {
  if (e.target.closest('.widget-buttons') || e.target.closest('.dropdown-content')) return;
  isDragging = true;
  const rect = widget.getBoundingClientRect();
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;
  widget.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  widget.style.left = (e.clientX - offsetX) + 'px';
  widget.style.top = (e.clientY - offsetY) + 'px';
  widget.style.right = 'auto';
  widget.style.bottom = 'auto';
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  widget.style.cursor = 'grab';
});

// Touch events
widget.addEventListener('touchstart', (e) => {
  if (e.target.closest('.widget-buttons') || e.target.closest('.dropdown-content')) return;
  isDragging = true;
  const rect = widget.getBoundingClientRect();
  offsetX = e.touches[0].clientX - rect.left;
  offsetY = e.touches[0].clientY - rect.top;
});
document.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  e.preventDefault();
  widget.style.left = (e.touches[0].clientX - offsetX) + 'px';
  widget.style.top = (e.touches[0].clientY - offsetY) + 'px';
  widget.style.right = 'auto';
  widget.style.bottom = 'auto';
}, {passive: false});
document.addEventListener('touchend', () => { isDragging = false; });

// --- HÀM CHUYỂN ĐỔI GIỮA OVERLAY VÀ WIDGET ---
function minimizeWidget() {
  document.getElementById('gameOverlay').classList.remove('active');
  document.getElementById('floatingWidget').style.display = 'flex';
  // Cập nhật dữ liệu mini
  updateWidgetData();
}

function maximizeWidget() {
  document.getElementById('floatingWidget').style.display = 'none';
  document.getElementById('gameOverlay').classList.add('active');
}

function closeWidget() {
  stopCooldown();
  clearInterval(interval);
  document.getElementById('floatingWidget').style.display = 'none';
  document.getElementById('gameOverlay').classList.remove('active');
  currentTool = ''; currentMode = '';
}

// Cập nhật thông tin hiển thị trên widget từ kết quả mới nhất
function updateWidgetData() {
  const predEl = document.getElementById('predictionText');
  const sessionEl = document.getElementById('sessionId');
  if (predEl && sessionEl) {
    document.getElementById('widgetPrediction').innerText = predEl.innerText || '--';
    document.getElementById('widgetPrediction').className = 'widget-prediction ' + (predEl.className.includes('tai') ? 'tai' : 'xiu');
    document.getElementById('widgetSession').innerText = 'Phiên: ' + (sessionEl.innerText || '--');
  }
}

function toggleWidgetMenu() {
  const menu = document.getElementById('widgetModeMenu');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// --- GIỮ NGUYÊN CÁC HÀM KHÁC (login, openGame, selectMode, fetchPrediction, analyzeMD5...) ---
// ... (như code cũ, thêm gọi updateWidgetData() sau khi fetch thành công)
// Đoạn fetchPrediction sau khi nhận dữ liệu sẽ gọi updateWidgetData() nếu widget đang hiện.

// Điều chỉnh selectMode để đồng bộ với widget mode menu
function selectMode(mode) {
  stopCooldown();
  currentMode = mode;
  document.getElementById('modeMenu').classList.remove('show');
  document.getElementById('modeDisplay').innerText = `Chế độ: ${mode.replace('_', ' ').toUpperCase()}`;
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('cooldownBanner').classList.remove('active');
  fetchPrediction();
  clearInterval(interval);
  interval = setInterval(fetchPrediction, 5000);
}

// Khi fetchPrediction thành công, gọi thêm:
// if (document.getElementById('floatingWidget').style.display === 'flex') updateWidgetData();

// Hàm closeGame (nút back trong overlay) cũng cần tắt widget nếu đang mở.
function closeGame() {
  stopCooldown();
  clearInterval(interval);
  document.getElementById('gameOverlay').classList.remove('active');
  document.getElementById('floatingWidget').style.display = 'none';
}
</script>
</body>
</html>
