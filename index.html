<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v7.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #0a0f1a; display:flex; justify-content:center; align-items:center; min-height:100vh; color:#fff; }
    .glass { background: rgba(20,30,50,0.8); backdrop-filter: blur(20px); border-radius: 24px; border:1px solid rgba(255,255,255,0.1); padding:30px; width:90%; max-width:450px; }
    .avatar { text-align:center; margin-bottom:20px; }
    .avatar img { width:100px; height:100px; border-radius:50%; border:2px solid cyan; }
    h1 { text-align:center; font-size:2rem; background:linear-gradient(45deg, cyan, magenta); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .input-field { width:100%; padding:15px; margin:10px 0; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.2); border-radius:12px; color:#fff; font-size:1rem; }
    .btn { width:100%; padding:15px; margin-top:10px; border:none; border-radius:12px; font-weight:bold; font-size:1.1rem; cursor:pointer; background:linear-gradient(135deg, #00d2ff, #b347ea); color:#fff; }
    .card { background:rgba(0,0,0,0.3); border-radius:16px; padding:20px; margin:15px 0; cursor:pointer; border:1px solid rgba(255,255,255,0.1); transition:0.3s; }
    .card:hover { border-color:cyan; }
    .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; z-index:10; }
    .overlay.active { display:flex; }
    .overlay-header { display:flex; justify-content:space-between; padding:20px; }
    .overlay-header i { font-size:24px; cursor:pointer; }
    .dropdown { position:relative; display:inline-block; }
    .dropdown-content { display:none; position:absolute; right:0; background:#1a1a2e; min-width:180px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.5); z-index:20; }
    .dropdown-content a { color:#fff; padding:12px 16px; text-decoration:none; display:block; border-bottom:1px solid rgba(255,255,255,0.1); }
    .dropdown-content a:hover { background:#00d2ff; }
    .show { display:block; }
    .result-box { text-align:center; margin-top:30px; }
    .result { font-size:3rem; font-weight:bold; margin:10px 0; }
    .tai { color:#ff3366; } .xiu { color:#00d2ff; }
  </style>
</head>
<body>
<div class="glass" id="login-screen">
  <div class="avatar"><img src="https://i.ibb.co/QFDKgC1R/1783519521054.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616438.png'"></div>
  <h1>DORAEMON AI v7.0</h1>
  <input class="input-field" id="username" placeholder="Tên đăng nhập">
  <input class="input-field" id="password" type="password" placeholder="Mật khẩu">
  <button class="btn" onclick="login()">ĐĂNG NHẬP</button>
  <div id="login-msg" style="color:red;text-align:center;margin-top:10px;"></div>
</div>

<div class="glass" id="main-screen" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 id="welcome" style="background:none; -webkit-text-fill-color:white;">Xin chào</h2>
    <i class="fas fa-sign-out-alt" style="cursor:pointer;" onclick="logout()"></i>
  </div>
  <div class="card" onclick="openGame('lc79')">
    <h3>🏦 LC79.BET</h3>
    <p>Nhấn để chọn chế độ</p>
  </div>
  <div class="card" onclick="openGame('betvip')">
    <h3>🎰 BETVIP</h3>
    <p>Nhấn để chọn chế độ</p>
  </div>
  <div class="card" onclick="openGame('sunwin')">
    <h3>☀️ SUNWIN</h3>
    <p>Nhấn để chọn chế độ</p>
  </div>
</div>

<div class="overlay" id="game-overlay">
  <div class="overlay-header">
    <i class="fas fa-arrow-left" onclick="closeGame()"></i>
    <span id="game-title" style="font-size:1.5rem; font-weight:bold;"></span>
    <div class="dropdown">
      <i class="fas fa-ellipsis-v" onclick="document.getElementById('modeDropdown').classList.toggle('show')"></i>
      <div class="dropdown-content" id="modeDropdown">
        <a href="#" onclick="selectMode('tx_md5')">Tài Xỉu MD5</a>
        <a href="#" onclick="selectMode('tx_hu')">Tài Xỉu Hũ</a>
        <a href="#" onclick="selectMode('xoc_dia')">Xóc Đĩa</a>
      </div>
    </div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div id="current-mode" style="font-size:1.2rem; margin-bottom:20px;">Chưa chọn chế độ</div>
    <div class="result-box" id="result-box" style="display:none;">
      <div>Dự đoán:</div>
      <div class="result" id="prediction"></div>
      <div>Độ chính xác: <span id="accuracy"></span>%</div>
      <div>Phiên: <span id="session"></span></div>
    </div>
    <div id="loading" style="display:none;">⏳ Đang phân tích cầu...</div>
  </div>
</div>

<script>
let auth = false, currentTool = "", currentMode = "", intervalId = null;

async function login() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    const msg = document.getElementById("login-msg");
    try {
        let res = await fetch("/api/login", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({username:u, password:p}) });
        let data = await res.json();
        if (data.status === "success") {
            auth = true;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("welcome").innerText = `Xin chào, ${data.data.name}`;
        } else msg.innerText = data.msg;
    } catch(e) { msg.innerText = "Lỗi kết nối"; }
}

function logout() {
    auth = false;
    document.getElementById("main-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "block";
}

function openGame(tool) {
    if (!auth) return;
    currentTool = tool;
    document.getElementById("game-title").innerText = tool.toUpperCase();
    document.getElementById("game-overlay").classList.add("active");
    document.getElementById("result-box").style.display = "none";
    document.getElementById("current-mode").innerText = "Chọn chế độ từ menu 3 chấm";
    clearInterval(intervalId);
}

function closeGame() {
    document.getElementById("game-overlay").classList.remove("active");
    clearInterval(intervalId);
}

function selectMode(mode) {
    currentMode = mode;
    document.getElementById("modeDropdown").classList.remove("show");
    document.getElementById("current-mode").innerText = `Chế độ: ${mode.replace("_"," ").toUpperCase()}`;
    startScan();
}

async function scan() {
    if (!currentTool || !currentMode) return;
    document.getElementById("loading").style.display = "block";
    document.getElementById("result-box").style.display = "none";
    try {
        let res = await fetch(`/api/scan?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
        let data = await res.json();
        document.getElementById("loading").style.display = "none";
        if (data.status === "success") {
            let pred = data.data.du_doan;
            document.getElementById("prediction").innerText = pred;
            document.getElementById("prediction").className = "result " + (pred.includes("TÀI")?"tai":"xiu");
            document.getElementById("accuracy").innerText = data.data.ti_le;
            document.getElementById("session").innerText = data.data.phien;
            document.getElementById("result-box").style.display = "block";
        }
    } catch(e) { document.getElementById("loading").innerText = "Lỗi"; }
}

function startScan() {
    clearInterval(intervalId);
    scan();
    intervalId = setInterval(scan, 5000); // quét mỗi 5s
}

// Đóng dropdown khi click ra ngoài
window.onclick = function(e) {
    if (!e.target.matches('.fa-ellipsis-v')) {
        document.getElementById("modeDropdown").classList.remove("show");
    }
}
</script>
</body>
</html>
