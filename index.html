<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HƯNG ĐẸP TRAI - CHUAHUNGKITO</title>
    <style>
        body { margin: 0; background: #020c1b; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #game-iframe { width: 100vw; height: 100vh; border: none; }
        
        /* Khung chứa công cụ điều khiển nổi */
        #ai-tool-overlay {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 320px; z-index: 9999; display: flex; flex-direction: column; align-items: center;
        }

        /* Logo trung tâm đóng vai trò nút kéo thả */
        #drag-handle { 
            width: 75px; height: 75px; border-radius: 50%; cursor: move; touch-action: none;
            border: 3px solid #00d2ff; box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); 
            overflow: hidden; margin-bottom: 15px; background: #000;
        }
        
        /* Bảng hiển thị thông số AI */
        #tool-content {
            background: rgba(6, 18, 36, 0.95); border: 2px solid #00d2ff;
            border-radius: 15px; padding: 15px; width: 100%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        /* Lựa chọn máy chủ dữ liệu */
        select.cyber-input {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid #00d2ff;
            color: #fff; padding: 10px; border-radius: 8px; outline: none; margin-bottom: 10px; font-weight: bold;
        }

        /* Khối hiển thị kết quả phân tích */
        .flex-boxes { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; }
        .pred-box {
            flex: 1; padding: 15px 0; border-radius: 10px; font-size: 1.5rem; font-weight: bold; color: #fff;
            border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); transition: 0.3s;
        }
        .box-xiu.active { background: rgba(0, 255, 102, 0.2); border-color: #00ff66; box-shadow: 0 0 15px #00ff66; color: #00ff66; }
        .box-tai.active { background: rgba(255, 0, 85, 0.2); border-color: #ff0055; box-shadow: 0 0 15px #ff0055; color: #ff0055; }

        /* Nút điều khiển thu nhỏ/phóng to dạng 3 chấm */
        .mini-dots-control { 
            position: fixed; bottom: 30px; left: 20px; color: #00d2ff; 
            font-size: 20px; cursor: pointer; z-index: 10000; background: rgba(0,0,0,0.5);
            padding: 5px 12px; border-radius: 10px; border: 1px solid #00d2ff; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <iframe id="game-iframe" src="https://lc79.bet"></iframe>

    <div id="ai-tool-overlay">
        <div id="drag-handle">
            <img src="https://i.ibb.co/kZTjfLL/1783386936192.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        
        <div id="tool-content">
            <select id="tool-selector" class="cyber-input" onchange="forceScan()">
                <option value="betvip_tx">MÁY CHỦ: BETVIP TỔNG HỢP</option>
                <option value="lc79_tx">MÁY CHỦ: LC79 TỔNG HỢP</option>
                <option value="sunwin_sicbo">MÁY CHỦ: SUNWIN TỔNG HỢP</option>
            </select>
            
            <div id="tool-title" style="color: #fff; font-weight: bold; letter-spacing: 1px;">MÃ PHIÊN: ĐANG QUÉT...</div>
            
            <div class="flex-boxes">
                <div class="pred-box box-xiu" id="box-l">XỈU</div>
                <div class="pred-box box-tai" id="box-r">TÀI</div>
            </div>

            <div id="tool-status" style="margin-top: 10px; font-size: 12px; color: #00d2ff;">CHUAHUNGKITO SYSTEM V2.0</div>
        </div>
    </div>

    <div class="mini-dots-control" onclick="toggleSize()">●●●</div>

    <script>
        // Cơ chế điều khiển kéo thả đa điểm tương thích Mobile/PC
        const overlay = document.getElementById('ai-tool-overlay');
        const handle = document.getElementById('drag-handle');
        let isDragging = false, startX, startY, initialX, initialY;

        handle.addEventListener('mousedown', dragStart);
        handle.addEventListener('touchstart', dragStart, {passive: false});
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            isDragging = true;
            if (e.type === 'touchstart') {
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            } else {
                startX = e.clientX; startY = e.clientY;
            }
            initialX = overlay.offsetLeft; initialY = overlay.offsetTop;
            overlay.style.transform = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let currentX, currentY;
            if (e.type === 'touchmove') {
                currentX = e.touches[0].clientX; currentY = e.touches[0].clientY;
            } else {
                currentX = e.clientX; currentY = e.clientY;
            }
            overlay.style.left = (initialX + currentX - startX) + 'px';
            overlay.style.top = (initialY + currentY - startY) + 'px';
        }

        function dragEnd() { isDragging = false; }

        // Cơ chế ẩn hiện nhanh giao diện qua nút 3 chấm
        let isMinimized = false;
        function toggleSize() {
            const content = document.getElementById('tool-content');
            isMinimized = !isMinimized;
            content.style.display = isMinimized ? 'none' : 'block';
        }

        // Đồng bộ dữ liệu phân tích từ Backend API
        async function scanAPI() {
            const tool = document.getElementById('tool-selector').value;
            try {
                let res = await fetch(`/api/scan?tool=${tool}`);
                let json = await res.json();
                
                if(json.status === 'success') {
                    document.getElementById('tool-title').innerText = 'MÃ PHIÊN: #' + json.data.phien;
                    
                    const boxX = document.getElementById('box-l');
                    const boxT = document.getElementById('box-r');
                    
                    boxX.classList.remove('active');
                    boxT.classList.remove('active');
                    
                    if(json.data.du_doan === 'TÀI') {
                        boxT.classList.add('active');
                        boxT.innerHTML = `TÀI<br><span style="font-size:12px">${json.data.ti_le}%</span>`;
                        boxX.innerHTML = `XỈU`;
                    } else {
                        boxX.classList.add('active');
                        boxX.innerHTML = `XỈU<br><span style="font-size:12px">${json.data.ti_le}%</span>`;
                        boxT.innerHTML = `TÀI`;
                    }
                }
            } catch (e) { console.log("Đang quét tín hiệu mạch..."); }
        }

        function forceScan() {
            document.getElementById('tool-title').innerText = 'ĐANG TẢI DỮ LIỆU...';
            scanAPI();
        }

        scanAPI();
        setInterval(scanAPI, 6000); // Tự động làm mới chu kỳ quét sau mỗi 6 giây
    </script>
</body>
</html>
