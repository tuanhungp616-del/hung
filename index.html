<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v12.0 – MINI TOOLBAR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; width:100%; overflow:hidden; background:#000; }
    #app { width:100%; height:100%; display:flex; flex-direction:column; }
    /* Màn hình nhập key */
    #key-screen {
      flex:1; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(circle at 50% 0%, #0a0015 0%, #000 100%);
    }
    .key-box {
      background: rgba(15,10,30,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid cyan;
      border-radius: 30px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,255,255,0.3);
      width: 90%;
      max-width: 400px;
    }
    .key-box h1 {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(90deg, #0ff, #f0f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .key-input {
      width:100%; padding:15px; border-radius:10px; border:none;
      background: #111; color:#fff; font-size:1.1rem; text-align:center;
      margin: 15px 0; outline:none; border:1px solid #333;
    }
    .key-input:focus { border-color: cyan; }
    .key-btn {
      width:100%; padding:15px; border:none; border-radius:10px;
      background: linear-gradient(135deg, cyan, magenta);
      color:#000; font-weight:700; font-size:1.2rem; cursor:pointer;
      margin-top: 10px;
    }
    /* Màn hình chọn sàn */
    #select-screen {
      flex:1; display:none; align-items:center; justify-content:center;
      background: radial-gradient(circle at 50% 0%, #0a0015 0%, #000 100%);
      flex-direction: column;
    }
    .select-btn {
      width: 80%; max-width: 300px; padding: 20px; margin: 15px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; color:#fff; font-size:1.5rem; cursor:pointer;
      text-align: center; transition: 0.3s;
    }
    .select-btn:hover { border-color: cyan; box-shadow: 0 0 30px cyan; }
    /* Màn hình game + toolbar */
    #game-screen {
      flex:1; display:none; flex-direction:column; position:relative;
    }
    #game-iframe {
      flex:1; border:none; width:100%;
    }
    #toolbar {
      height: 60px; background: rgba(10,10,20,0.95);
      border-top: 1px solid cyan;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 15px;
      backdrop-filter: blur(15px);
      z-index: 200;
    }
    .toolbar-left { display:flex; align-items:center; gap:10px; }
    .toolbar-exit {
      background: none; border: none; color: #ff3366; font-size: 1.3rem;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      font-weight: 700;
    }
    .toolbar-prediction {
      font-size: 1.5rem; font-weight: 900;
      display: flex; align-items: center; gap: 10px;
    }
    .toolbar-prediction .pred-text { font-size: 2rem; }
    .tai { color: #ff3366; } .xiu { color: #00ccff; }
    .cooldown-text { font-size: 0.9rem; color: #ff9800; }
    .toolbar-right { position: relative; }
    .menu-btn { background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }
    .menu-dropdown {
      display: none; position: absolute; bottom: 70px; right: 0;
      background: #1a1a2e; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      min-width: 180px; overflow: hidden; z-index: 300;
    }
    .menu-dropdown a {
      color: #fff; padding: 14px 20px; display: block; font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.1); text-decoration: none;
    }
    .menu-dropdown a:hover { background: cyan; color: #000; }
    .show { display: block; }
  </style>
</head>
<body>
<div id="app">
  <!-- KEY SCREEN -->
  <div id="key-screen">
    <div class="key-box">
      <h1>DORAEMON AI</h1>
      <input type="password" id="keyInput" class="key-input" placeholder="Nhập key admin...">
      <button class="key-btn" onclick="verifyKey()">MỞ KHÓA</button>
      <p id="keyError" style="color:red; margin-top:10px;"></p>
    </div>
  </div>

  <!-- SELECT SCREEN -->
  <div id="select-screen">
    <button class="select-btn" onclick="startGame('lc79')">🏦 LC79.BET</button>
    <button class="select-btn" onclick="startGame('betvip')">🎰 BETVIP</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <iframe id="game-iframe" src="" allow="camera;microphone"></iframe>
    <div id="toolbar">
      <div class="toolbar-left">
        <button class="toolbar-exit" onclick="exitGame()"><i class="fas fa-times"></i> Thoát</button>
      </div>
      <div class="toolbar-prediction" id="predictionArea">
        <span class="pred-text" id="predText">--</span>
        <span class="cooldown-text" id="cooldownText"></span>
      </div>
      <div class="toolbar-right">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-ellipsis-v"></i></button>
        <div class="menu-dropdown" id="modeMenu">
          <a href="#" onclick="selectMode('tx_md5')">🎯 Tài Xỉu MD5</a>
          <a href="#" onclick="selectMode('tx')">🎰 Tài Xỉu Hũ</a>
          <a href="#" onclick="selectMode('xoc_dia')">🎲 Xóc Đĩa</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Biến toàn cục
let apiKey = '';
let currentTool = '';
let currentMode = '';
let scanTimer = null;
let cooldownTimer = null;
let cooldownActive = false;

// Hàm verify key
async function verifyKey() {
  const key = document.getElementById('keyInput').value.trim();
  const err = document.getElementById('keyError');
  if (!key) { err.innerText = 'Vui lòng nhập key!'; return; }
  err.innerText = '';
  try {
    const res = await fetch('/api/verify_key', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ key: key })
    });
    const data = await res.json();
    if (data.status === 'success') {
      apiKey = key;
      document.getElementById('key-screen').style.display = 'none';
      document.getElementById('select-screen').style.display = 'flex';
    } else {
      err.innerText = data.msg || 'Key không hợp lệ!';
    }
  } catch(e) {
    err.innerText = 'Lỗi kết nối!';
  }
}

// Bắt đầu game (mở iframe và toolbar)
function startGame(tool) {
  currentTool = tool;
  currentMode = ''; // chưa chọn chế độ
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  
  // Chọn URL web nhà cái
  let url = '';
  if (tool === 'lc79') url = 'https://lc79.bet';
  else if (tool === 'betvip') url = 'https://play.betvip.fit';
  else url = 'https://lc79.bet';
  document.getElementById('game-iframe').src = url;
  
  // Reset dự đoán
  document.getElementById('predText').innerText = '--';
  document.getElementById('predText').className = 'pred-text';
  document.getElementById('cooldownText').innerText = '';
  stopAllTimers();
  cooldownActive = false;
}

// Thoát game, quay lại màn chọn sàn
function exitGame() {
  stopAllTimers();
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  document.getElementById('game-iframe').src = '';
  currentTool = '';
  currentMode = '';
}

// Chọn chế độ từ menu
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeMenu').classList.remove('show');
  // Bắt đầu quét ngay
  stopAllTimers();
  cooldownActive = false;
  document.getElementById('cooldownText').innerText = '';
  scanNow(); // lần đầu
  scanTimer = setInterval(() => {
    if (!cooldownActive) scanNow();
  }, 1000); // kiểm tra mỗi giây, nhưng scanNow sẽ tự cooldown sau khi có kết quả
}

// Dừng tất cả timer
function stopAllTimers() {
  if (scanTimer) clearInterval(scanTimer);
  if (cooldownTimer) clearInterval(cooldownTimer);
  scanTimer = null;
  cooldownTimer = null;
}

// Gọi API scan
async function scanNow() {
  if (!currentTool || !currentMode || cooldownActive) return;
  try {
    const res = await fetch(`/api/scan?tool=${currentTool}&mode=${currentMode}&key=${apiKey}`);
    const data = await res.json();
    if (data.status === 'success') {
      const d = data.data;
      const pred = d.du_doan;
      const predEl = document.getElementById('predText');
      predEl.innerText = pred;
      predEl.className = 'pred-text ' + (pred.includes('TÀI') ? 'tai' : 'xiu');
      // Bắt đầu cooldown 15 giây
      startCooldown();
    }
  } catch(e) {
    console.error(e);
  }
}

// Bắt đầu đếm ngược 15 giây
function startCooldown() {
  cooldownActive = true;
  let sec = 15;
  document.getElementById('cooldownText').innerText = `(${sec}s)`;
  cooldownTimer = setInterval(() => {
    sec--;
    document.getElementById('cooldownText').innerText = `(${sec}s)`;
    if (sec <= 0) {
      clearInterval(cooldownTimer);
      cooldownTimer = null;
      cooldownActive = false;
      document.getElementById('cooldownText').innerText = '';
    }
  }, 1000);
}

// Toggle menu 3 chấm
function toggleMenu() {
  document.getElementById('modeMenu').classList.toggle('show');
}

// Đóng menu khi click bên ngoài
window.addEventListener('click', function(e) {
  if (!e.target.closest('.menu-btn') && !e.target.closest('.menu-dropdown')) {
    document.getElementById('modeMenu').classList.remove('show');
  }
});
</script>
</body>
</html>
