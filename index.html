<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING AI V9 - OMEGA MATRIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --secondary: #00ffcc; --accent: #ff0055; --bg: #050505; --panel: rgba(10,10,15,0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }
        
        header { height: 70px; background: var(--panel); border-bottom: 2px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-shadow: 0 5px 25px rgba(0,255,204,0.3); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--secondary); text-shadow: 0 0 10px var(--secondary); display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--secondary); box-shadow: 0 0 10px var(--secondary); }
        .badge { background: rgba(0,255,204,0.1); border: 1px solid var(--secondary); color: var(--secondary); padding: 5px 10px; border-radius: 8px; font-size: 11px; text-align: right; }
        
        #auth-wrapper, .modal-overlay { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(10px); background: rgba(0,0,0,0.9); }
        .auth-box, .modal-box { background: var(--panel); border: 2px solid var(--secondary); border-radius: 15px; padding: 25px; width: 90%; max-width: 380px; box-shadow: 0 0 40px rgba(0,255,204,0.4); text-align: center; }
        
        #main-dashboard { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .cate-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); margin: 20px 0 10px; text-transform: uppercase; text-shadow: 0 0 10px rgba(255,0,85,0.5); border-left: 4px solid var(--accent); padding-left: 10px; }
        
        .cyber-btn { padding: 14px; border: 2px solid var(--secondary); border-radius: 8px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; color: #000; width: 100%; margin-bottom: 10px; background: linear-gradient(90deg, #00ffcc, #00b3ff); box-shadow: 0 0 15px rgba(0,255,204,0.5); display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .cyber-btn:active { transform: scale(0.95); }
        .btn-red { background: transparent; color: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(255,0,85,0.3); }
        .btn-purple { background: transparent; color: #b300ff; border-color: #b300ff; box-shadow: 0 0 15px rgba(179,0,255,0.3); }
        
        .banner { width: 100%; height: 110px; border-radius: 10px; border: 2px solid #333; object-fit: cover; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--secondary); border-radius: 8px; color: var(--secondary); padding: 12px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }

        #game-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; }
        #game-frame { width: 100%; height: 100%; border: none; }
        .close-game-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: var(--accent); border: 2px solid var(--accent); padding: 8px 15px; border-radius: 8px; font-weight: 900; z-index: 2001; }
        
        #draggable-robot { position: absolute; top: 40%; left: 5%; z-index: 2005; display: flex; align-items: center; }
        .robo-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--secondary); box-shadow: 0 0 20px var(--secondary); cursor: grab; z-index: 2; margin-right: -20px; background: #000; }
        
        .robo-dialog { background: rgba(5,5,10,0.95); border: 2px solid var(--secondary); padding: 15px 15px 15px 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(0,255,204,0.4); width: 190px; position: relative; z-index: 1; }
        .robo-dialog::before { content: ''; position: absolute; inset: -2px; border-radius: 16px; background: linear-gradient(45deg, var(--secondary), var(--accent), var(--secondary)); z-index: -1; filter: blur(5px); opacity: 0.5; animation: glow 3s linear infinite; }
        @keyframes glow { 0% { filter: hue-rotate(0deg) blur(5px); } 100% { filter: hue-rotate(360deg) blur(5px); } }

        .active-tool-badge { background: var(--accent); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 5px; margin-bottom: 5px; display: inline-block; letter-spacing: 1px; box-shadow: 0 0 10px var(--accent); }
        .phien-text { font-size: 11px; color: #aaa; margin-bottom: 5px; }
        .kq-text { font-family: 'Playfair Display', serif; font-size: 26px; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); margin: 5px 0; }
        .tyle-text { color: var(--secondary); font-size: 12px; }
        
        .stats-box { border-top: 1px dashed #555; margin-top: 10px; padding-top: 8px; font-size: 11px; display: flex; justify-content: space-around; }
        .glow-red { color: #ff3333; text-shadow: 0 0 8px #ff3333; }
        .glow-green { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; font-weight: 900; }

        #robo-menu { display: none; position: absolute; top: 35px; right: -130px; background: #000; border: 1px solid var(--secondary); border-radius: 8px; z-index: 2010; width: 160px; text-align: left; }
        .menu-item { padding: 10px; font-size: 11px; cursor: pointer; border-bottom: 1px solid #333; color: var(--secondary); }
        .menu-row { display: flex; justify-content: space-between; padding: 8px; background: rgba(255,255,255,0.05); }
        .btn-sz { flex: 1; border: 1px solid var(--secondary); background: transparent; color: var(--secondary); border-radius: 5px; font-size: 12px; padding: 6px; margin: 0 3px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <button class="close-game-btn" onclick="closeGame()"><i class="fas fa-power-off"></i> THOÁT</button>
        <iframe id="game-frame" src=""></iframe>
        <div id="draggable-robot">
            <img class="robo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png">
            <div class="robo-dialog">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="active-tool-badge" id="robo-tool-name">BETVIP</div>
                    <i class="fas fa-cog" style="color:var(--secondary); cursor:pointer;" onclick="toggleMenu()"></i>
                </div>
                
                <div id="robo-menu">
                    <div class="menu-item" onclick="switchTool('betvip_tx', 'BETVIP TÀI XỈU', 'https://play.betvip.fit/')"><i class="fas fa-dice"></i> BETVIP TÀI XỈU</div>
                    <div class="menu-item" onclick="switchTool('betvip_md5', 'BETVIP MD5', 'https://play.betvip.fit/')"><i class="fas fa-bolt"></i> BETVIP MD5</div>
                    <div class="menu-item" onclick="switchTool('lc79_tx', 'LC79 TÀI XỈU', 'https://lc79.bet')"><i class="fas fa-dice"></i> LC79 TÀI XỈU</div>
                    <div class="menu-item" onclick="switchTool('lc79_md5', 'LC79 MD5', 'https://lc79.bet')"><i class="fas fa-bolt"></i> LC79 MD5</div>
                    <div class="menu-item" onclick="switchTool('lc79_xd', 'LC79 XÓC ĐĨA', 'https://lc79.bet')"><i class="fas fa-dot-circle"></i> LC79 XÓC ĐĨA</div>
                    <div class="menu-row">
                        <button class="btn-sz" onclick="changeRoboSize(0.7)">Nhỏ</button>
                        <button class="btn-sz" onclick="changeRoboSize(1)">Vừa</button>
                        <button class="btn-sz" onclick="changeRoboSize(1.3)">To</button>
                    </div>
                </div>

                <div class="phien-text">PHIÊN: <span id="robo-phien" style="color:#fff; font-weight:bold;">ĐANG TẢI...</span></div>
                <div class="kq-text" id="robo-kq">SCANNING</div>
                <div class="tyle-text" id="robo-tyle">Đang đồng bộ API...</div>
                
                <div class="stats-box" id="robo-thongke" style="display:none;">
                    <div class="glow-red"><span id="tk-tai-label">TÀI</span>: <span id="tk-tai">0</span></div>
                    <div style="color:#fff;"><span id="tk-xiu-label">XỈU</span>: <span id="tk-xiu">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-wrapper">
        <div class="auth-box">
            <div class="logo" style="justify-content:center; margin-bottom:15px; font-size:2rem;"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png"></div>
            <div style="font-family:'Playfair Display'; font-size:1.5rem; color:var(--secondary); margin-bottom:20px;">V9 OMEGA MATRIX</div>
            <input type="text" id="auth-key" class="input-box" placeholder="NHẬP MÃ KEY VÀO ĐÂY...">
            <button class="cyber-btn" onclick="verifyKey()"><i class="fas fa-key"></i> KÍCH HOẠT HỆ THỐNG</button>
            <div id="auth-msg" style="margin-top:10px; color:var(--accent); font-weight:bold;"></div>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <div class="logo"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png"> HƯNG ADMIN</div>
        <div class="badge">Trạng thái: <span style="color:#00ffcc;">Online</span><br>HSD: <span id="header-expire">...</span></div>
    </header>

    <div id="main-dashboard">
        <div class="cate-title"><i class="fas fa-crown"></i> CỔNG BETVIP V9</div>
        <div class="grid-2">
            <button class="cyber-btn" onclick="switchTool('betvip_tx', 'BETVIP TÀI XỈU', 'https://play.betvip.fit/')"><i class="fas fa-dice"></i> TÀI XỈU HŨ</button>
            <button class="cyber-btn btn-red" onclick="switchTool('betvip_md5', 'BETVIP MD5', 'https://play.betvip.fit/')"><i class="fas fa-bolt"></i> TÀI XỈU MD5</button>
        </div>
        
        <div class="cate-title" style="margin-top: 30px;"><i class="fas fa-gem"></i> CỔNG LC79 V9</div>
        <div class="grid-2" style="margin-bottom: 10px;">
            <button class="cyber-btn" onclick="switchTool('lc79_tx', 'LC79 TÀI XỈU', 'https://lc79.bet')"><i class="fas fa-dice"></i> TÀI XỈU HŨ</button>
            <button class="cyber-btn btn-red" onclick="switchTool('lc79_md5', 'LC79 MD5', 'https://lc79.bet')"><i class="fas fa-bolt"></i> TÀI XỈU MD5</button>
        </div>
        <button class="cyber-btn btn-purple" onclick="switchTool('lc79_xd', 'LC79 XÓC ĐĨA', 'https://lc79.bet')"><i class="fas fa-dot-circle"></i> XÓC ĐĨA CHẴN LẺ</button>
        
        <button class="cyber-btn" id="btn-admin" style="display:none; margin-top:30px; background:transparent; border-color:#aaa; color:#aaa;" onclick="document.getElementById('admin-modal').style.display='flex'">⚙️ QUẢN TRỊ</button>
        <button class="cyber-btn btn-red" style="margin-top:10px;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> ĐĂNG XUẤT</button>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box" style="max-width: 500px;">
            <div class="close-btn" style="position:absolute; top:10px; right:15px; color:#fff;" onclick="this.parentElement.parentElement.style.display='none'">×</div>
            <h3 style="color:var(--secondary); margin-bottom:15px;">TẠO KEY MỚI</h3>
            <input type="text" id="custom-key-input" class="input-box" placeholder="Tên Key (Trống = Random)">
            <select id="key-duration" class="input-box"><option value="1H">1 Giờ</option><option value="1D">1 Ngày</option><option value="3D">3 Ngày</option><option value="30D">30 Ngày</option></select>
            <button class="cyber-btn" onclick="adminCreateKey()">TẠO KEY</button>
            <div id="admin-keys" style="margin-top:15px; text-align:left; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>
        <script>
        let currentKey = localStorage.getItem("royal_key") || ""; 
        let scanInterval; let phienCu = ""; let activeGame = ""; 
        let isPredicting = false; 

        if(currentKey) { document.getElementById('auth-key').value = currentKey; verifyKey(true); }

        async function verifyKey(isAuto = false) {
            let k = document.getElementById('auth-key').value.trim();
            if(!k) return document.getElementById('auth-msg').innerText = "Nhập Key vào!";
            if(!isAuto) document.getElementById('auth-msg').innerText = "Đang kết nối V9 Matrix...";
            
            try {
                let res = await fetch('/api/verify_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key: k})});
                let json = await res.json();
                if (json.status === "success") {
                    currentKey = k; localStorage.setItem("royal_key", currentKey); 
                    document.getElementById('auth-wrapper').style.display = 'none'; 
                    document.getElementById('main-header').style.display = 'flex'; 
                    document.getElementById('main-dashboard').style.display = 'block';
                    document.getElementById('header-expire').innerText = json.expire;
                    if(json.role === "admin") { document.getElementById('btn-admin').style.display = 'flex'; loadAdminData(); }
                } else { 
                    if(!isAuto) document.getElementById('auth-msg').innerText = json.msg;
                    else { localStorage.removeItem("royal_key"); currentKey = ""; }
                }
            } catch(e) { if(!isAuto) document.getElementById('auth-msg').innerText = "Lỗi kết nối Server!"; }
        }

        function logout() { 
            localStorage.removeItem("royal_key"); currentKey = ""; closeGame();
            document.getElementById('main-header').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'none'; 
            document.getElementById('auth-wrapper').style.display = 'flex'; document.getElementById('auth-key').value = "";
            document.getElementById('auth-msg').innerText = "Đã thoát.";
        }

        function toggleMenu() { let m = document.getElementById('robo-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }

        // ĐỔI 5 TOOL VỚI LUỒNG API ĐỘC LẬP
        function switchTool(gameId, toolName, url) {
            document.getElementById('robo-menu').style.display = 'none';
            if (url !== '') document.getElementById('game-frame').src = url;
            
            activeGame = gameId;
            phienCu = ""; // Reset mã phiên cũ
            isPredicting = false;
            clearInterval(scanInterval);
            
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('robo-tool-name').innerText = toolName;
            document.getElementById('robo-phien').innerText = "ĐANG TẢI...";
            document.getElementById('robo-kq').innerText = "SCANNING";
            document.getElementById('robo-tyle').innerText = "Đang kết nối API " + gameId + "...";
            document.getElementById('robo-thongke').style.display = 'none';

            // Xóc Đĩa thì đổi nhãn
            if (gameId === 'lc79_xd') {
                document.getElementById('tk-tai-label').innerText = "CHẴN"; document.getElementById('tk-xiu-label').innerText = "LẺ";
            } else {
                document.getElementById('tk-tai-label').innerText = "TÀI"; document.getElementById('tk-xiu-label').innerText = "XỈU";
            }

            getSignalTX();
            scanInterval = setInterval(getSignalTX, 2000);
        }

        function closeGame() {
            activeGame = ""; phienCu = ""; clearInterval(scanInterval); isPredicting = false;
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        async function getSignalTX() {
            if (isPredicting || !activeGame) return; 
            try {
                let res = await fetch(`/api/scan?tool=${activeGame}&key=${currentKey}`); let json = await res.json();
                if(json.status === "error") { 
                    if(json.msg.includes("Đang đồng bộ")) return; 
                    alert(json.msg); closeGame(); 
                    if(json.msg.includes("hết hạn") || json.msg.includes("khóa")) logout();
                    return; 
                }
                
                let data = json.data;
                if(data.phien !== phienCu && data.phien !== "ĐANG TẢI...") {
                    isPredicting = true; 
                    phienCu = data.phien; 
                    
                    document.getElementById('robo-phien').innerText = "#" + data.phien;
                    let el = document.getElementById('robo-kq'); let tyleEl = document.getElementById('robo-tyle');
                    
                    el.innerText = "LOADING..."; el.style.color = "var(--secondary)";
                    tyleEl.innerHTML = "V9 Matrix phân tích...";
                    document.getElementById('robo-thongke').style.display = 'none';

                    setTimeout(() => {
                        el.innerText = data.du_doan; 
                        if (data.dao_cau) { tyleEl.innerHTML = "<span class='glow-green'>🔄 AUTO ĐẢO CẦU</span> | WIN: " + data.ti_le + "%"; } 
                        else { tyleEl.innerText = "TỶ LỆ WIN: " + data.ti_le + "%"; }
                        
                        el.style.color = (data.du_doan === "TÀI" || data.du_doan === "CHẴN") ? "#ff0055" : "#fff";
                        
                        if(data.tong_chan !== undefined && data.tong_le !== undefined) {
                            document.getElementById('robo-thongke').style.display = 'flex';
                            document.getElementById('tk-tai').innerText = data.tong_chan; document.getElementById('tk-xiu').innerText = data.tong_le;
                        } else if(data.tong_tai !== undefined && data.tong_xiu !== undefined) {
                            document.getElementById('robo-thongke').style.display = 'flex';
                            document.getElementById('tk-tai').innerText = data.tong_tai; document.getElementById('tk-xiu').innerText = data.tong_xiu;
                        }
                        isPredicting = false; 
                    }, 4000);
                }
            } catch (e) {}
        }

        async function loadAdminData() { 
            let res = await fetch(`/api/admin/list_keys?admin_key=${currentKey}`); let json = await res.json(); 
            if(json.status !== "success") return; 
            let htmlKeys = ""; 
            json.keys.forEach(k => { 
                let btn = k[2] == 0 ? `<button class="btn-sz" style="color:#ff0055; border-color:#ff0055;" onclick="actionKey('${k[0]}','ban')">KHÓA</button>` : `<button class="btn-sz" style="color:#00ffcc; border-color:#00ffcc;" onclick="actionKey('${k[0]}','unban')">MỞ</button>`;
                htmlKeys += `<div style="border-bottom:1px solid #333; padding:10px 0;"><div style="display:flex; justify-content:space-between; align-items:center;"><b style="color:var(--secondary);">${k[0]}</b>${btn}</div><div style="font-size:10px; color:#888;">HSD: ${k[1]}</div><button class="btn-sz" style="width:100%; margin-top:5px;" onclick="actionKey('${k[0]}','delete')">XÓA BỎ</button></div>`; 
            }); 
            document.getElementById('admin-keys').innerHTML = htmlKeys || "<i style='color:#555;'>Trống.</i>"; 
        }

        async function adminCreateKey() {
            let dur = document.getElementById('key-duration').value; let customK = document.getElementById('custom-key-input').value.trim();
            let res = await fetch('/api/admin/create_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, duration: dur, custom_key: customK}) });
            let json = await res.json();
            if(json.status === "success") { prompt("Copy Key:", json.new_key); document.getElementById('custom-key-input').value = ""; loadAdminData(); } 
            else alert("Lỗi: " + json.msg);
        }

        async function actionKey(target, act) { 
            if(act === 'delete' && !confirm("Xóa vĩnh viễn?")) return;
            await fetch('/api/admin/action_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, target_key: target, action: act})}); loadAdminData(); 
        }

        dragElement(document.getElementById("draggable-robot"));
        function dragElement(elmnt) {
            var pos1=0, pos2=0, pos3=0, pos4=0; var img = elmnt.querySelector('.robo-img');
            img.onmousedown = dragMouseDown; img.ontouchstart = dragTouchStart;
            function dragMouseDown(e) { e = e || window.event; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function dragTouchStart(e) { pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; document.ontouchend = closeDragElement; document.ontouchmove = elementTouchDrag; }
            function elementDrag(e) { e = e || window.event; e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function elementTouchDrag(e) { pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY; pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }
    </script>
</body>
</html>
