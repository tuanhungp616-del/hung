<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING AI V8.0 - RENDER EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.15); --text-glow: #e0eaff; --accent: #00e5ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: url('https://i.postimg.cc/WbZ6yqX7/abstract-dark-background.jpg') center/cover fixed; color: #fff; overflow-x: hidden; min-height: 100vh; }
        
        /* Glassmorphism Classes */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        
        header { height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; position: sticky; top:0; z-index: 100; background: rgba(5,5,10,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); text-shadow: 0 0 10px var(--accent); display: flex; align-items: center; gap: 8px; }
        .logo-img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); }
        
        /* Nút Báo Cáo Góc Phải */
        .report-btn { background: linear-gradient(45deg, #ff0055, #ff5500); padding: 8px 15px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; box-shadow: 0 0 15px rgba(255,0,85,0.4); border: 1px solid #fff; display: flex; align-items: center; gap: 5px; }
        
        #auth-wrapper, .modal-overlay { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(10px); background: rgba(0,0,0,0.7); }
        .auth-box { padding: 30px; width: 90%; max-width: 380px; text-align: center; }
        
        #main-dashboard { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .cate-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #fff; margin: 20px 0 10px; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        .cyber-btn { padding: 15px; border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900; color: #fff; width: 100%; margin-bottom: 12px; background: rgba(255,255,255,0.05); transition: 0.3s; text-transform: uppercase; }
        .cyber-btn:hover { background: rgba(0, 229, 255, 0.2); border-color: var(--accent); box-shadow: 0 0 15px rgba(0,229,255,0.3); }
        .banner { width: 100%; height: 120px; border-radius: 12px; border: 1px solid var(--glass-border); object-fit: cover; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-box { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--accent); padding: 14px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; letter-spacing: 1px; }

        #game-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; }
        #game-frame { width: 100%; height: 100%; border: none; }
        .close-game-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #fff; padding: 8px 15px; border-radius: 8px; font-weight: 900; z-index: 2001; }
        
        #draggable-robot { position: absolute; top: 40%; left: 5%; z-index: 2005; display: flex; align-items: center; }
        .robo-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent); cursor: grab; z-index: 2; margin-right: -15px; background: #000; }
        
        .robo-dialog { padding: 15px 15px 15px 25px; text-align: center; width: 180px; position: relative; z-index: 1; }
        
        .active-tool-badge { background: var(--accent); color: #000; font-weight: 900; font-size: 10px; padding: 3px 8px; border-radius: 5px; margin-bottom: 5px; display: inline-block; }
        .phien-text { font-size: 11px; color: #ccc; margin-bottom: 5px; font-weight: bold; }
        .kq-text { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.8); margin: 5px 0; }
        .tyle-text { color: var(--accent); font-size: 12px; font-weight: 900;}

        /* Panel Báo Cáo Lịch Sử */
        #report-panel { display: none; position: absolute; top: 75px; right: 10px; width: 280px; max-height: 350px; overflow-y: auto; z-index: 105; padding: 15px; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; font-size: 11px; font-weight: bold; }
        .win-badge { background: rgba(0,255,0,0.2); color: #00ffcc; padding: 3px 6px; border-radius: 4px; border: 1px solid #00ffcc; }
        .lose-badge { background: rgba(255,0,0,0.2); color: #ff3333; padding: 3px 6px; border-radius: 4px; border: 1px solid #ff3333; }
        
        .stats-box { border-top: 1px dashed rgba(255,255,255,0.2); margin-top: 10px; padding-top: 8px; font-size: 11px; display: flex; justify-content: space-around; }
        .glow-red { color: #ff3333; font-weight: 900;}
        .glow-white { color: #fff; font-weight: 900;}
    </style>
</head>
<body>

    <div id="game-overlay">
        <button class="close-game-btn" onclick="closeGame()"><i class="fas fa-times"></i></button>
        <iframe id="game-frame" src=""></iframe>
        <div id="draggable-robot">
            <img class="robo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png">
            <div class="robo-dialog glass-panel">
                <div class="active-tool-badge" id="robo-tool-name">BETVIP</div>
                <div class="phien-text">PHIÊN: <span id="robo-phien" style="color:#fff;">ĐANG TẢI...</span></div>
                <div class="kq-text" id="robo-kq">SCAN</div>
                <div class="tyle-text" id="robo-tyle">Đồng bộ V8.0...</div>
                <div class="stats-box" id="robo-thongke" style="display:none;">
                    <div class="glow-red"><span id="tk-tai-label">TÀI</span>: <span id="tk-tai">0</span></div>
                    <div class="glow-white"><span id="tk-xiu-label">XỈU</span>: <span id="tk-xiu">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-wrapper">
        <div class="auth-box glass-panel">
            <div class="logo" style="justify-content:center; margin-bottom:15px; font-size:2rem;"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png"></div>
            <div style="font-family:'Playfair Display'; font-size:1.5rem; color:var(--accent); margin-bottom:20px;">V8.0 RENDER EDITION</div>
            <input type="text" id="auth-key" class="input-box" placeholder="NHẬP KEY VÀO ĐÂY...">
            <button class="cyber-btn" onclick="verifyKey()" style="background:var(--accent); color:#000;">KÍCH HOẠT HỆ THỐNG</button>
            <div id="auth-msg" style="margin-top:10px; color:#ff3333; font-weight:bold;"></div>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <div class="logo"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png"> V8.0 UI</div>
        <div class="report-btn" onclick="toggleReport()"><i class="fas fa-chart-bar"></i> BÁO CÁO PHIÊN</div>
    </header>

    <div id="report-panel" class="glass-panel">
        <div style="color:var(--accent); font-weight:900; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:5px;">LỊCH SỬ 6 VÁN GẦN NHẤT</div>
        <div id="history-content"><i style="color:#aaa; font-size:11px;">Chưa có dữ liệu. Hãy mở 1 cổng game để quét.</i></div>
    </div>

    <div id="main-dashboard">
        <div class="glass-panel" style="padding: 15px; margin-bottom: 20px;">
            <div class="cate-title">HỆ THỐNG BETVIP</div>
            <div class="grid-2">
                <button class="cyber-btn" onclick="switchTool('betvip_tx', 'BETVIP TÀI XỈU', 'https://play.betvip.fit/')">TÀI XỈU HŨ</button>
                <button class="cyber-btn" onclick="switchTool('betvip_md5', 'BETVIP MD5', 'https://play.betvip.fit/')">TÀI XỈU MD5</button>
            </div>
        </div>
        
        <div class="glass-panel" style="padding: 15px;">
            <div class="cate-title">HỆ THỐNG LC79.BET</div>
            <div class="grid-2" style="margin-bottom: 10px;">
                <button class="cyber-btn" onclick="switchTool('lc79_tx', 'LC79 TÀI XỈU', 'https://lc79.bet')">TÀI XỈU HŨ</button>
                <button class="cyber-btn" onclick="switchTool('lc79_md5', 'LC79 MD5', 'https://lc79.bet')">TÀI XỈU MD5</button>
            </div>
            <button class="cyber-btn" onclick="switchTool('lc79_xd', 'LC79 XÓC ĐĨA', 'https://lc79.bet')" style="border-color:#ff0055; color:#ff0055;">XÓC ĐĨA CHẴN LẺ</button>
        </div>
        
        <button class="cyber-btn" id="btn-admin" style="display:none; margin-top:20px; border-color:#00ffcc; color:#00ffcc;" onclick="document.getElementById('admin-modal').style.display='flex'">⚙️ TẠO KEY VIP</button>
        <button class="cyber-btn" style="margin-top:10px; border-color:#ff3333; color:#ff3333;" onclick="logout()">ĐĂNG XUẤT</button>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box glass-panel" style="max-width: 500px;">
            <div class="close-game-btn" style="top:10px; right:15px; left:auto;" onclick="this.parentElement.parentElement.style.display='none'">×</div>
            <h3 style="color:var(--accent); margin-bottom:15px;">QUẢN LÝ KEY</h3>
            <input type="text" id="custom-key-input" class="input-box" placeholder="Tên Key (Trống = Random)">
            <select id="key-duration" class="input-box"><option value="1H">1 Giờ</option><option value="1D">1 Ngày</option><option value="3D">3 Ngày</option><option value="30D">30 Ngày</option></select>
            <button class="cyber-btn" style="background:var(--accent); color:#000;" onclick="adminCreateKey()">TẠO KEY</button>
            <div id="admin-keys" style="margin-top:15px; text-align:left; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>
        <script>
        let currentKey = localStorage.getItem("royal_key") || ""; 
        let scanInterval; let phienCu = ""; let activeGame = ""; 
        let isPredicting = false; 

        if(currentKey) { document.getElementById('auth-key').value = currentKey; verifyKey(true); }

        function toggleReport() {
            let rp = document.getElementById('report-panel');
            rp.style.display = rp.style.display === 'block' ? 'none' : 'block';
        }

        async function verifyKey(isAuto = false) {
            let k = document.getElementById('auth-key').value.trim();
            if(!k) return document.getElementById('auth-msg').innerText = "Nhập Mã Key vào!";
            if(!isAuto) document.getElementById('auth-msg').innerText = "Đang xác thực...";
            
            try {
                let res = await fetch('/api/verify_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key: k})});
                let json = await res.json();
                if (json.status === "success") {
                    currentKey = k; localStorage.setItem("royal_key", currentKey); 
                    document.getElementById('auth-wrapper').style.display = 'none'; 
                    document.getElementById('main-header').style.display = 'flex'; 
                    document.getElementById('main-dashboard').style.display = 'block';
                    if(json.role === "admin") { document.getElementById('btn-admin').style.display = 'flex'; loadAdminData(); }
                } else { 
                    if(!isAuto) document.getElementById('auth-msg').innerText = json.msg;
                    else { localStorage.removeItem("royal_key"); currentKey = ""; }
                }
            } catch(e) { if(!isAuto) document.getElementById('auth-msg').innerText = "Lỗi kết nối Máy Chủ Render!"; }
        }

        function logout() { 
            localStorage.removeItem("royal_key"); currentKey = ""; closeGame();
            document.getElementById('main-header').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'none'; 
            document.getElementById('report-panel').style.display = 'none';
            document.getElementById('auth-wrapper').style.display = 'flex'; document.getElementById('auth-key').value = "";
            document.getElementById('auth-msg').innerText = "";
        }

        function switchTool(gameId, toolName, url) {
            if (url !== '') document.getElementById('game-frame').src = url;
            activeGame = gameId; phienCu = ""; isPredicting = false; clearInterval(scanInterval);
            
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('robo-tool-name').innerText = toolName;
            document.getElementById('robo-phien').innerText = "TẢI...";
            document.getElementById('robo-kq').innerText = "SCAN";
            document.getElementById('robo-thongke').style.display = 'none';

            if (gameId === 'lc79_xd') {
                document.getElementById('tk-tai-label').innerText = "CHẴN"; document.getElementById('tk-xiu-label').innerText = "LẺ";
            } else {
                document.getElementById('tk-tai-label').innerText = "TÀI"; document.getElementById('tk-xiu-label').innerText = "XỈU";
            }

            getSignalTX(); scanInterval = setInterval(getSignalTX, 2000);
        }

        function closeGame() {
            activeGame = ""; phienCu = ""; clearInterval(scanInterval); isPredicting = false;
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        async function getSignalTX() {
            if (isPredicting || !activeGame) return; 
            try {
                let res = await fetch(`/api/scan?tool=${activeGame}&key=${currentKey}`); let json = await res.json();
                if(json.status === "error") { 
                    if(json.msg.includes("đồng bộ")) return; 
                    alert(json.msg); closeGame(); 
                    if(json.msg.includes("hết hạn") || json.msg.includes("khóa")) logout();
                    return; 
                }
                
                let data = json.data;
                if(data.phien !== phienCu && data.phien !== "ĐANG TẢI...") {
                    isPredicting = true; phienCu = data.phien; 
                    
                    document.getElementById('robo-phien').innerText = "#" + data.phien;
                    let el = document.getElementById('robo-kq'); let tyleEl = document.getElementById('robo-tyle');
                    
                    el.innerText = "WAIT..."; el.style.color = "var(--accent)";
                    tyleEl.innerText = "V8.0 Đang phân tích...";
                    document.getElementById('robo-thongke').style.display = 'none';

                    // CẬP NHẬT BẢNG BÁO CÁO LỊCH SỬ GÓC PHẢI
                    if(data.history && data.history.length > 0) {
                        let htmlHist = "";
                        data.history.forEach(h => {
                            let badge = h.status === "WIN" ? `<span class="win-badge">WIN</span>` : `<span class="lose-badge">LOSE</span>`;
                            htmlHist += `<div class="hist-item"><span>#${h.phien}</span><span>Dự: ${h.du_doan} | Về: ${h.ket_qua}</span>${badge}</div>`;
                        });
                        document.getElementById('history-content').innerHTML = htmlHist;
                    }

                    setTimeout(() => {
                        el.innerText = data.du_doan; 
                        tyleEl.innerText = "TỶ LỆ WIN: " + data.ti_le + "%";
                        el.style.color = (data.du_doan === "TÀI" || data.du_doan === "CHẴN") ? "#ff3333" : "#fff";
                        
                        if(data.tong_chan !== undefined && data.tong_le !== undefined) {
                            document.getElementById('robo-thongke').style.display = 'flex';
                            document.getElementById('tk-tai').innerText = data.tong_chan; document.getElementById('tk-xiu').innerText = data.tong_le;
                        } else if(data.tong_tai !== undefined && data.tong_xiu !== undefined) {
                            document.getElementById('robo-thongke').style.display = 'flex';
                            document.getElementById('tk-tai').innerText = data.tong_tai; document.getElementById('tk-xiu').innerText = data.tong_xiu;
                        }
                        isPredicting = false; 
                    }, 4000);
                }
            } catch (e) {}
        }

        async function loadAdminData() { 
            let res = await fetch(`/api/admin/list_keys?admin_key=${currentKey}`); let json = await res.json(); 
            if(json.status !== "success") return; 
            let htmlKeys = ""; 
            json.keys.forEach(k => { 
                let btn = k[2] == 0 ? `<button class="cyber-btn" style="padding:5px; font-size:10px; margin:0; border-color:#ff3333; color:#ff3333;" onclick="actionKey('${k[0]}','ban')">KHÓA</button>` : `<button class="cyber-btn" style="padding:5px; font-size:10px; margin:0; border-color:#00ffcc; color:#00ffcc;" onclick="actionKey('${k[0]}','unban')">MỞ</button>`;
                htmlKeys += `<div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0;"><div style="display:flex; justify-content:space-between; align-items:center;"><b style="color:var(--accent);">${k[0]}</b>${btn}</div><div style="font-size:10px; color:#aaa;">HSD: ${k[1]}</div><button class="cyber-btn" style="padding:5px; font-size:10px; margin-top:5px; width:100%; border-color:#555;" onclick="actionKey('${k[0]}','delete')">XÓA BỎ</button></div>`; 
            }); 
            document.getElementById('admin-keys').innerHTML = htmlKeys || "<i style='color:#555;'>Trống.</i>"; 
        }

        async function adminCreateKey() {
            let dur = document.getElementById('key-duration').value; let customK = document.getElementById('custom-key-input').value.trim();
            let res = await fetch('/api/admin/create_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, duration: dur, custom_key: customK}) });
            let json = await res.json();
            if(json.status === "success") { prompt("Copy Key:", json.new_key); document.getElementById('custom-key-input').value = ""; loadAdminData(); } 
            else alert("Lỗi: " + json.msg);
        }

        async function actionKey(target, act) { 
            if(act === 'delete' && !confirm("Xóa vĩnh viễn?")) return;
            await fetch('/api/admin/action_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, target_key: target, action: act})}); loadAdminData(); 
        }

        dragElement(document.getElementById("draggable-robot"));
        function dragElement(elmnt) {
            var pos1=0, pos2=0, pos3=0, pos4=0; var img = elmnt.querySelector('.robo-img');
            img.onmousedown = dragMouseDown; img.ontouchstart = dragTouchStart;
            function dragMouseDown(e) { e = e || window.event; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function dragTouchStart(e) { pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; document.ontouchend = closeDragElement; document.ontouchmove = elementTouchDrag; }
            function elementDrag(e) { e = e || window.event; e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function elementTouchDrag(e) { pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY; pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }
    </script>
</body>
</html>
