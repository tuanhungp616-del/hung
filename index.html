<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v7.0 – VIP PRO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Space Grotesk', sans-serif; }
    body { background: radial-gradient(circle at 50% 0%, #1a0a2e 0%, #0a0a1a 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; color:#fff; }
    :root { --cyan: #00e5ff; --magenta: #e040fb; --gold: #ffd740; --red: #ff3d5a; --blue: #00b0ff; --glass-bg: rgba(20,10,40,0.7); --glass-border: rgba(255,255,255,0.15); }
    .glass { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border:1px solid var(--glass-border); border-radius:32px; padding:30px 25px; width:100%; max-width:440px; box-shadow:0 20px 50px rgba(0,0,0,0.6); }
    .avatar img { width:110px; height:110px; border-radius:50%; border:3px solid var(--cyan); box-shadow:0 0 30px var(--cyan); animation:float 3s infinite; object-fit:cover; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    h1 { font-size:2.4rem; font-weight:900; background:linear-gradient(135deg,var(--cyan),var(--magenta)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; margin-bottom:8px; }
    .subtitle { text-align:center; font-size:0.9rem; color:var(--gold); letter-spacing:3px; text-transform:uppercase; margin-bottom:30px; }
    .input-field { width:100%; padding:16px; margin:12px 0; background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.2); border-radius:14px; color:#fff; font-size:1rem; outline:none; }
    .input-field:focus { border-color:var(--magenta); box-shadow:0 0 20px rgba(224,64,251,0.4); }
    .btn { width:100%; padding:16px; margin-top:15px; border:none; border-radius:14px; font-weight:700; font-size:1.1rem; cursor:pointer; background:linear-gradient(135deg,var(--cyan),var(--magenta)); color:#fff; text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 8px 25px rgba(0,229,255,0.3); }
    .btn:hover { transform:translateY(-3px); box-shadow:0 15px 35px rgba(224,64,251,0.5); }
    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:20px; margin:15px 0; cursor:pointer; transition:0.3s; }
    .card:hover { border-color:var(--cyan); background:rgba(0,229,255,0.08); box-shadow:0 0 30px rgba(0,229,255,0.25); transform:translateY(-5px); }
    .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,0,15,0.95); display:none; flex-direction:column; z-index:100; }
    .overlay.active { display:flex; }
    .overlay-header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:rgba(0,0,0,0.3); }
    .dropdown-content { display:none; position:absolute; right:0; top:45px; background:#1a0a2e; min-width:200px; border-radius:16px; box-shadow:0 15px 35px rgba(0,0,0,0.8); z-index:200; }
    .dropdown-content a { color:#fff; padding:14px 20px; display:block; border-bottom:1px solid rgba(255,255,255,0.05); }
    .dropdown-content a:hover { background:var(--cyan); color:#000; }
    .show { display:block; }
    .result-number { font-size:8rem; font-weight:900; line-height:1; margin:20px 0; animation:pulse 2s infinite; }
    .tai { color:var(--red); text-shadow:0 0 40px rgba(255,61,90,0.6); }
    .xiu { color:var(--blue); text-shadow:0 0 40px rgba(0,176,255,0.6); }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    .history-box { margin-top:30px; width:100%; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:16px; padding:10px; }
    .history-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.1); font-size:0.9rem; }
    .history-item:last-child { border-bottom:none; }
    .win { color:#4caf50; } .lose { color:var(--red); }
    .reverse-badge { background:var(--gold); color:#000; padding:2px 10px; border-radius:20px; font-size:0.8rem; font-weight:700; margin-left:10px; }
  </style>
</head>
<body>
<div class="glass" id="loginScreen">
  <div style="text-align:center; margin-bottom:25px;">
    <img src="https://i.ibb.co/QFDKgC1R/1783519521054.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616438.png'" class="avatar">
  </div>
  <h1>DORAEMON AI</h1>
  <div class="subtitle">Intelligence System Pro (10.000 tỷ)</div>
  <input id="usernameInput" class="input-field" placeholder="Tên đăng nhập">
  <input id="passwordInput" type="password" class="input-field" placeholder="Mật khẩu">
  <button class="btn" onclick="login()"><i class="fas fa-robot"></i> KÍCH HOẠT</button>
  <p id="loginError" style="color:var(--red); text-align:center; margin-top:15px;"></p>
</div>

<div class="glass" id="dashboard" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
    <h2 id="welcomeUser" style="font-size:1.8rem;">ADMIN</h2>
    <i class="fas fa-sign-out-alt" style="font-size:1.5rem; cursor:pointer;" onclick="logout()"></i>
  </div>
  <div class="card" onclick="openGame('lc79')"><h3>🏦 LC79.BET</h3><p>Chạm để mở</p></div>
  <div class="card" onclick="openGame('betvip')"><h3>🎰 BETVIP</h3><p>Chạm để mở</p></div>
  <div class="card" onclick="openGame('sunwin')"><h3>☀️ SUNWIN</h3><p>Chạm để mở</p></div>
</div>

<div class="overlay" id="gameOverlay">
  <div class="overlay-header">
    <i class="fas fa-chevron-left" onclick="closeGame()" style="font-size:1.5rem; cursor:pointer;"></i>
    <span id="gameTitle" style="font-size:1.5rem; font-weight:700;"></span>
    <div style="position:relative;">
      <i class="fas fa-ellipsis-v" onclick="document.getElementById('modeMenu').classList.toggle('show')" style="font-size:1.5rem; cursor:pointer;"></i>
      <div class="dropdown-content" id="modeMenu">
        <a href="#" onclick="selectMode('tx_md5')">🎯 Tài Xỉu MD5</a>
        <a href="#" onclick="selectMode('tx_hu')">🎰 Tài Xỉu Hũ</a>
        <a href="#" onclick="selectMode('xoc_dia')">🎲 Xóc Đĩa</a>
      </div>
    </div>
  </div>
  <div style="flex:1; overflow-y:auto; padding:20px;">
    <div id="modeDisplay" style="text-align:center; margin-bottom:20px; color:rgba(255,255,255,0.6);">Chọn chế độ</div>
    <div id="loading" style="text-align:center; display:none;"><i class="fas fa-spinner fa-pulse"></i> Đang phân tích...</div>
    <div id="resultBox" style="display:none; text-align:center;">
      <div>DỰ ĐOÁN</div>
      <div class="result-number" id="predictionText"></div>
      <div>Phiên: <span id="sessionId"></span></div>
      <div>Độ chính xác: <span id="accuracyValue"></span>%</div>
      <div id="reasonText" style="color:var(--gold); margin-top:10px;"></div>
      <div id="reverseIndicator" class="reverse-badge" style="display:none;">ĐẢO CẦU</div>
    </div>
    <div class="history-box">
      <div style="font-weight:700; margin-bottom:10px;">📜 Lịch sử dự đoán</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
let auth=false, currentTool='', currentMode='', interval=null;

async function login(){
  const u=document.getElementById("usernameInput").value.trim();
  const p=document.getElementById("passwordInput").value.trim();
  const err=document.getElementById("loginError");
  try{
    const res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
    const d=await res.json();
    if(d.status==="success"){
      auth=true;
      document.getElementById("welcomeUser").innerText=`Xin chào, ${d.data.name.toUpperCase()}`;
      document.getElementById("loginScreen").style.display="none";
      document.getElementById("dashboard").style.display="block";
    }else err.innerText=d.msg;
  }catch(e){err.innerText="Lỗi kết nối";}
}

function logout(){
  auth=false; clearInterval(interval);
  document.getElementById("dashboard").style.display="none";
  document.getElementById("loginScreen").style.display="block";
  document.getElementById("gameOverlay").classList.remove("active");
}

function openGame(tool){
  if(!auth)return;
  currentTool=tool;
  document.getElementById("gameTitle").innerText=tool.toUpperCase();
  document.getElementById("gameOverlay").classList.add("active");
  document.getElementById("resultBox").style.display="none";
  document.getElementById("loading").style.display="none";
  document.getElementById("modeDisplay").innerText="Chọn chế độ từ menu 3 chấm";
  clearInterval(interval);
  loadHistory();
}

function closeGame(){
  document.getElementById("gameOverlay").classList.remove("active");
  clearInterval(interval);
}

function selectMode(mode){
  currentMode=mode;
  document.getElementById("modeMenu").classList.remove("show");
  document.getElementById("modeDisplay").innerText=`Chế độ: ${mode.replace("_"," ").toUpperCase()}`;
  document.getElementById("resultBox").style.display="none";
  document.getElementById("loading").style.display="block";
  fetchPrediction();
  clearInterval(interval);
  interval=setInterval(fetchPrediction,5000);
}

async function fetchPrediction(){
  if(!currentTool||!currentMode)return;
  try{
    const res=await fetch(`/api/scan?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
    const d=await res.json();
    document.getElementById("loading").style.display="none";
    if(d.status==="success"){
      const pred=d.data.du_doan;
      document.getElementById("predictionText").innerText=pred;
      document.getElementById("predictionText").className="result-number "+(pred.includes("TÀI")?"tai":"xiu");
      document.getElementById("sessionId").innerText=d.data.phien;
      document.getElementById("accuracyValue").innerText=d.data.ti_le;
      document.getElementById("reasonText").innerText=d.data.loi_khuyen||"";
      document.getElementById("reverseIndicator").style.display=d.data.reverse_mode?"inline-block":"none";
      document.getElementById("resultBox").style.display="block";
      loadHistory();
    }
  }catch(e){
    document.getElementById("loading").innerHTML='<i class="fas fa-exclamation-triangle"></i> Lỗi';
  }
}

async function loadHistory(){
  try{
    const res=await fetch(`/api/history?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
    const data=await res.json();
    const container=document.getElementById("historyList");
    container.innerHTML="";
    if(data.length===0){
      container.innerHTML='<div style="text-align:center; color:gray;">Chưa có dữ liệu</div>';
      return;
    }
    data.reverse().forEach(item=>{
      const div=document.createElement("div");
      div.className="history-item";
      div.innerHTML=`
        <span>#${item.phien}</span>
        <span>${item.du_doan}</span>
        <span class="${item.win?'win':'lose'}">${item.win?'✅ Thắng':'❌ Thua'}</span>
      `;
      container.appendChild(div);
    });
  }catch(e){}
}

window.addEventListener('click',function(e){
  if(!e.target.closest('.fa-ellipsis-v')){
    document.getElementById("modeMenu").classList.remove("show");
  }
});
</script>
</body>
        </html>
