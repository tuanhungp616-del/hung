<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DORAEMON AI v6.0 PRO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Space Grotesk', sans-serif; }
    body {
      background: radial-gradient(circle at 50% 0%, #1a0a2e 0%, #0a0a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      color: #fff;
    }
    :root {
      --cyan: #00e5ff;
      --magenta: #e040fb;
      --gold: #ffd740;
      --red: #ff3d5a;
      --blue: #00b0ff;
      --glass-bg: rgba(20, 10, 40, 0.7);
      --glass-border: rgba(255, 255, 255, 0.15);
    }
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 30px 25px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }
    .avatar {
      text-align: center;
      margin-bottom: 25px;
    }
    .avatar img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--cyan);
      box-shadow: 0 0 30px var(--cyan);
      animation: float 3s ease-in-out infinite;
      object-fit: cover;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }
    .input-field {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      font-weight: 500;
    }
    .input-field:focus {
      border-color: var(--magenta);
      box-shadow: 0 0 20px rgba(224, 64, 251, 0.4);
    }
    .btn {
      width: 100%;
      padding: 16px;
      margin-top: 15px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 25px rgba(0, 229, 255, 0.3);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(224, 64, 251, 0.5);
    }
    .btn:active {
      transform: scale(0.97);
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 20px;
      margin: 15px 0;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      border-color: var(--cyan);
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
      transform: translateY(-5px);
    }
    .card h3 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #fff;
    }
    .card p {
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(5, 0, 15, 0.95);
      display: none;
      flex-direction: column;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .overlay.active {
      display: flex;
    }
    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 25px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
    }
    .overlay-header i {
      font-size: 1.6rem;
      cursor: pointer;
      transition: 0.2s;
      color: #fff;
    }
    .overlay-header i:hover {
      color: var(--cyan);
    }
    .dropdown {
      position: relative;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 40px;
      background: #1a0a2e;
      min-width: 200px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
      z-index: 200;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }
    .dropdown-content a {
      color: #fff;
      padding: 14px 20px;
      text-decoration: none;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-weight: 600;
      transition: 0.2s;
    }
    .dropdown-content a:hover {
      background: var(--cyan);
      color: #000;
    }
    .show { display: block; }
    .result-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }
    .prediction-number {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      margin: 20px 0;
      animation: pulse 2s infinite;
    }
    .tai { color: var(--red); text-shadow: 0 0 40px rgba(255, 61, 90, 0.6); }
    .xiu { color: var(--blue); text-shadow: 0 0 40px rgba(0, 176, 255, 0.6); }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    .info {
      font-size: 1.2rem;
      margin: 8px 0;
      color: rgba(255,255,255,0.8);
    }
    .info span {
      font-weight: 700;
      color: #fff;
    }
    .loading-spinner {
      font-size: 2rem;
      color: var(--cyan);
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .version-tag {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, var(--magenta), var(--cyan));
      color: #fff;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div class="glass" id="loginScreen">
    <div class="version-tag">v6.0 PRO</div>
    <div class="avatar">
      <img src="https://i.ibb.co/QFDKgC1R/1783519521054.png" alt="Doraemon AI" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616438.png'">
    </div>
    <h1>DORAEMON AI</h1>
    <div class="subtitle">Intelligence System Pro</div>
    <input type="text" id="usernameInput" class="input-field" placeholder="Tên đăng nhập">
    <input type="password" id="passwordInput" class="input-field" placeholder="Mật khẩu">
    <button class="btn" onclick="login()"><i class="fas fa-robot"></i> KÍCH HOẠT AI</button>
    <p id="loginError" style="color:var(--red); text-align:center; margin-top:15px; font-weight:600;"></p>
  </div>

  <!-- MAIN DASHBOARD -->
  <div class="glass" id="dashboardScreen" style="display:none;">
    <div class="version-tag">v6.0 PRO</div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
      <h2 id="welcomeUser" style="font-size:1.8rem; background:none; -webkit-text-fill-color:#fff; margin:0;">ADMIN</h2>
      <i class="fas fa-sign-out-alt" style="font-size:1.5rem; cursor:pointer; color:#fff;" onclick="logout()"></i>
    </div>
    <div class="card" onclick="openGame('lc79')">
      <h3><i class="fas fa-crown" style="color:var(--gold);"></i> LC79.BET</h3>
      <p>Chạm để mở bảng điều khiển</p>
    </div>
    <div class="card" onclick="openGame('betvip')">
      <h3><i class="fas fa-gem" style="color:var(--cyan);"></i> BETVIP</h3>
      <p>Chạm để mở bảng điều khiển</p>
    </div>
    <div class="card" onclick="openGame('sunwin')">
      <h3><i class="fas fa-sun" style="color:var(--gold);"></i> SUNWIN</h3>
      <p>Chạm để mở bảng điều khiển</p>
    </div>
  </div>

  <!-- GAME OVERLAY -->
  <div class="overlay" id="gameOverlay">
    <div class="overlay-header">
      <i class="fas fa-chevron-left" onclick="closeGame()"></i>
      <span id="gameTitle" style="font-size:1.6rem; font-weight:700;"></span>
      <div class="dropdown">
        <i class="fas fa-ellipsis-v" onclick="document.getElementById('modeMenu').classList.toggle('show')"></i>
        <div class="dropdown-content" id="modeMenu">
          <a href="#" onclick="selectMode('tx_md5')">🎯 Tài Xỉu MD5</a>
          <a href="#" onclick="selectMode('tx_hu')">🎰 Tài Xỉu Hũ</a>
          <a href="#" onclick="selectMode('xoc_dia')">🎲 Xóc Đĩa</a>
        </div>
      </div>
    </div>
    <div class="result-container">
      <div id="modeDisplay" style="font-size:1.2rem; color:rgba(255,255,255,0.6); margin-bottom:20px;">Chọn chế độ từ góc phải</div>
      <div id="loadingIndicator" style="display:none;">
        <i class="fas fa-spinner loading-spinner"></i>
        <p style="margin-top:15px;">Đang phân tích Markov...</p>
      </div>
      <div id="resultBox" style="display:none; text-align:center;">
        <div style="font-size:1.1rem; color:rgba(255,255,255,0.6);">DỰ ĐOÁN</div>
        <div class="prediction-number" id="predictionText"></div>
        <div class="info">Phiên: <span id="sessionId"></span></div>
        <div class="info">Độ chính xác: <span id="accuracyValue"></span>%</div>
        <div class="info" style="font-size:0.9rem; color:var(--gold);" id="reasonText"></div>
      </div>
    </div>
  </div>

  <script>
    let authToken = null;
    let currentTool = null;
    let currentMode = null;
    let scanInterval = null;

    async function login() {
      const user = document.getElementById("usernameInput").value.trim();
      const pass = document.getElementById("passwordInput").value.trim();
      const errorEl = document.getElementById("loginError");
      if (!user || !pass) {
        errorEl.innerText = "Vui lòng nhập đầy đủ thông tin!";
        return;
      }
      errorEl.innerText = "";
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.status === "success") {
          authToken = user;
          document.getElementById("welcomeUser").innerText = `Xin chào, ${data.data.name.toUpperCase()}`;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("dashboardScreen").style.display = "block";
        } else {
          errorEl.innerText = data.msg;
        }
      } catch (e) {
        errorEl.innerText = "Lỗi kết nối đến máy chủ!";
      }
    }

    function logout() {
      authToken = null;
      clearInterval(scanInterval);
      document.getElementById("dashboardScreen").style.display = "none";
      document.getElementById("loginScreen").style.display = "block";
      document.getElementById("usernameInput").value = "";
      document.getElementById("passwordInput").value = "";
      document.getElementById("gameOverlay").classList.remove("active");
    }

    function openGame(tool) {
      if (!authToken) return;
      currentTool = tool;
      document.getElementById("gameTitle").innerText = tool.toUpperCase();
      document.getElementById("gameOverlay").classList.add("active");
      document.getElementById("resultBox").style.display = "none";
      document.getElementById("loadingIndicator").style.display = "none";
      document.getElementById("modeDisplay").innerText = "Chọn chế độ từ menu 3 chấm";
      clearInterval(scanInterval);
      document.getElementById("modeMenu").classList.remove("show");
    }

    function closeGame() {
      document.getElementById("gameOverlay").classList.remove("active");
      clearInterval(scanInterval);
    }

    function selectMode(mode) {
      currentMode = mode;
      document.getElementById("modeMenu").classList.remove("show");
      document.getElementById("modeDisplay").innerText = `Chế độ: ${mode.replace("_"," ").toUpperCase()}`;
      document.getElementById("resultBox").style.display = "none";
      document.getElementById("loadingIndicator").style.display = "block";
      fetchPrediction();
      clearInterval(scanInterval);
      scanInterval = setInterval(fetchPrediction, 5000);
    }

    async function fetchPrediction() {
      if (!currentTool || !currentMode) return;
      try {
        const res = await fetch(`/api/scan?tool=${currentTool}&mode=${currentMode}&key=hungki98vip`);
        const json = await res.json();
        document.getElementById("loadingIndicator").style.display = "none";
        if (json.status === "success") {
          const d = json.data;
          const pred = d.du_doan;
          const predEl = document.getElementById("predictionText");
          predEl.innerText = pred;
          predEl.className = "prediction-number " + (pred.includes("TÀI") ? "tai" : "xiu");
          document.getElementById("sessionId").innerText = d.phien;
          document.getElementById("accuracyValue").innerText = d.ti_le;
          document.getElementById("reasonText").innerText = d.loi_khuyen || "";
          document.getElementById("resultBox").style.display = "block";
        }
      } catch (e) {
        document.getElementById("loadingIndicator").innerHTML = '<i class="fas fa-exclamation-triangle"></i> Lỗi kết nối';
      }
    }

    // Đóng dropdown khi bấm bên ngoài
    window.addEventListener('click', function(e) {
      if (!e.target.closest('.fa-ellipsis-v')) {
        document.getElementById("modeMenu").classList.remove("show");
      }
    });
  </script>
</body>
</html>
