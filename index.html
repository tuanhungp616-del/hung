<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUNGCUTO NANO V17</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --red: #ff2a2a; --bg: #070707; --panel: rgba(15, 15, 15, 0.9); --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Nunito', sans-serif; background: #000; color: #fff; overflow-x: hidden; min-height: 100vh; }
        
        .glass { background: var(--panel); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.9); backdrop-filter: blur(5px);}
        
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: #000; border-bottom: 2px solid var(--gold); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gold); }
        
        #auth-wrapper, .modal-overlay { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 999; background: rgba(0,0,0,0.95); }
        .auth-box { padding: 25px 20px; width: 90%; max-width: 320px; text-align: center; }
        
        #main-dashboard { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
        .cate-title { font-size: 1rem; color: var(--gold); margin: 10px 0; text-transform: uppercase; border-left: 3px solid var(--red); padding-left: 8px; font-family: 'Playfair Display';}
        
        .btn { padding: 12px; border: 1px solid var(--gold); border-radius: 6px; cursor: pointer; font-family: 'Nunito'; font-size: 12px; font-weight: 900; color: #000; width: 100%; margin-bottom: 10px; background: linear-gradient(90deg, #FFD700, #DAA520); text-transform: uppercase; }
        .btn-dark { background: #111; color: var(--gold); }
        .btn-red { background: var(--red); border-color: var(--red); color: #fff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--gold); border-radius: 6px; color: var(--gold); padding: 10px; text-align: center; margin-bottom: 15px; font-weight: bold; }

        #game-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: #000; }
        #game-frame { width: 100%; height: 100%; border: none; }
        .close-game-btn { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: var(--red); border: 2px solid var(--red); padding: 5px 10px; border-radius: 6px; font-weight: 900; z-index: 2001; cursor:pointer; font-size: 12px;}
        
        /* BẢNG LỊCH SỬ GÓC TRÁI (DƯỚI NÚT THOÁT) */
        #left-history-panel { position: absolute; top: 50px; left: 10px; width: 130px; background: rgba(5,5,10,0.85); border: 1px solid var(--gold); border-radius: 8px; padding: 8px; z-index: 2001; font-size: 9px; max-height: 200px; overflow-y: auto; pointer-events: none; }
        .hist-title { color: var(--gold); font-weight: 900; text-align: center; border-bottom: 1px dashed var(--gold); padding-bottom: 3px; margin-bottom: 5px; font-size: 10px;}
        .hist-row { display: flex; justify-content: space-between; margin-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px;}
        .hist-win { color: #00ffcc; font-weight: bold;}
        .hist-lose { color: var(--red); font-weight: bold;}

        /* SA BÀN ROBOT NANO (THU NHỎ LẠI) */
        #draggable-robot { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); z-index: 2005; width: 240px; }
        .robo-dialog { padding: 10px; width: 100%; position: relative; z-index: 1; border: 2px solid var(--gold); border-radius: 10px; background: rgba(10,5,15,0.95); display: flex; flex-direction: column; align-items: center; }
        
        .header-phien { font-size: 12px; font-weight: 900; color: #fff; margin-bottom: 8px; letter-spacing: 1px;}
        .phien-id { color: var(--gold); }

        .battle-board { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0; }
        
        .side-box { width: 50px; height: 60px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Playfair Display'; font-size: 16px; font-weight: 900; color: #555; background: rgba(0,0,0,0.8); opacity: 0.5; transition: 0.2s;}
        .side-tai.active { opacity: 1; color: var(--red); border-color: var(--red); background: rgba(255,42,42,0.2); box-shadow: 0 0 15px rgba(255,42,42,0.8); text-shadow: 0 0 5px var(--red); transform: scale(1.05); }
        .side-xiu.active { opacity: 1; color: var(--cyan); border-color: var(--cyan); background: rgba(0,255,255,0.2); box-shadow: 0 0 15px rgba(0,255,255,0.8); text-shadow: 0 0 5px var(--cyan); transform: scale(1.05); }

        .center-hub { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 80px; }
        .robo-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); background: #000; z-index: 5;}
        
        .countdown-ring { margin-top: 5px; font-size: 14px; font-family: 'Courier New'; font-weight: 900; color: #00ffcc; text-shadow: 0 0 5px #00ffcc; background: rgba(0,255,204,0.1); border: 1px solid #00ffcc; padding: 2px 10px; border-radius: 10px; display: none;}

        .advice-text { color: var(--gold); font-size: 10px; font-weight: 900; text-transform: uppercase; margin-top: 8px; width: 100%; text-align: center;}
        
        .kpi-inline { display: flex; justify-content: space-between; width: 100%; font-size: 9px; font-weight: bold; color: #aaa; margin-top: 5px; border-top: 1px dashed #444; padding-top: 5px;}
        .kpi-win { color: #00ffcc; } .kpi-lose { color: var(--red); }

        .setup-kpi-panel { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 15px; }
        .kpi-input { width: 40px; background: #111; border: 1px solid var(--gold); color: #fff; padding: 2px; text-align: center; font-weight: bold; border-radius: 4px; font-size:10px;}

        #stealth-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: #fff; }
        #stealth-frame { width: 100%; height: 100%; border: none; }
        
        #victory-screen { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.95); z-index: 50; border-radius: 10px; flex-direction:column; justify-content:center; align-items:center; }
        .victory-text { color: var(--gold); font-family: 'Playfair Display'; font-size: 16px; font-weight: 900; text-align: center; }
        .voice-toggle { position: absolute; top: 10px; right: 10px; color: var(--gold); font-size: 16px; cursor: pointer; z-index: 2001;}
    </style>
</head>
<body>

    <div id="stealth-overlay"><iframe id="stealth-frame" src="https://vnexpress.net"></iframe></div>

    <div id="game-overlay">
        <button class="close-game-btn" onclick="closeGame()"><i class="fas fa-times"></i> ĐÓNG</button>
        <i class="fas fa-volume-up voice-toggle" id="btn-voice" onclick="toggleVoice()"></i>
        
        <div id="left-history-panel">
            <div class="hist-title">LỊCH SỬ AI</div>
            <div id="left-history-content"><i style="color:#777;">Đang tải...</i></div>
        </div>

        <iframe id="game-frame" src=""></iframe>
        
        <div id="draggable-robot">
            <div class="robo-dialog glass">
                <div id="victory-screen"><div class="victory-text"><i class="fas fa-trophy"></i><br>ĐẠT KPI</div></div>
                
                <div class="header-phien">PHIÊN: <span id="robo-phien" class="phien-id">...</span></div>
                
                <div class="battle-board">
                    <div class="side-box side-tai" id="box-tai">TÀI</div>
                    <div class="center-hub">
                        <img class="robo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png">
                        <div class="countdown-ring" id="timer-15s">15s</div>
                    </div>
                    <div class="side-box side-xiu" id="box-xiu">XỈU</div>
                </div>
                
                <div class="advice-text" id="robo-advice"><i class="fas fa-sync fa-spin"></i> KẾT NỐI...</div>
                
                <div class="kpi-inline">
                    <span>W: <span class="kpi-win" id="live-win">0</span>/<span id="target-win-show">5</span></span>
                    <span>L: <span class="kpi-lose" id="live-lose">0</span>/<span id="target-lose-show">3</span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-wrapper">
        <div class="auth-box glass">
            <div class="logo" style="justify-content:center; margin-bottom:10px; font-size:2rem;"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png" style="width:50px; height:50px;"></div>
            <div style="font-family:'Playfair Display'; font-size:1.5rem; color:var(--gold); font-weight:900;">HUNGCUTO NANO</div>
            <div style="font-size: 9px; color: #888; margin-bottom: 20px; letter-spacing: 2px;">V17 COMPACT EDITION</div>
            
            <input type="password" id="auth-key" class="input-box" placeholder="NHẬP KEY: hungadmin11">
            <button class="btn" onclick="verifyKey()"><i class="fas fa-fingerprint"></i> KÍCH HOẠT</button>
            <div id="auth-msg" style="margin-top:5px; color:var(--red); font-size:11px; font-weight:bold;"></div>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <div class="logo" onclick="toggleStealth()"><img class="logo-img" src="https://i.postimg.cc/wMdhjZFJ/1773446152525.png"> V17 NANO</div>
        <div style="color:var(--red); cursor:pointer; font-weight:bold; font-size:12px;" onclick="logout()"><i class="fas fa-power-off"></i> THOÁT</div>
    </header>

    <div id="main-dashboard">
        <div class="setup-kpi-panel">
            <div class="cate-title" style="margin-top:0; font-size:12px;"><i class="fas fa-bullseye"></i> CHỐT LỜI / LỖ (VÁN)</div>
            <div style="display:flex; justify-content:space-between; font-size:10px; color:#aaa;">
                <div>THẮNG: <input type="number" id="setup-win" class="kpi-input" value="5"></div>
                <div>THUA: <input type="number" id="setup-lose" class="kpi-input" value="3"></div>
            </div>
        </div>

        <div class="glass" style="padding: 10px; margin-bottom: 12px;">
            <div class="cate-title" style="font-size:12px;">CỔNG BETVIP</div>
            <div class="grid-2">
                <button class="btn" onclick="switchTool('betvip_tx', 'BETVIP TÀI XỈU', 'https://play.betvip.fit/')">TÀI XỈU HŨ</button>
                <button class="btn btn-dark" onclick="switchTool('betvip_md5', 'BETVIP MD5', 'https://play.betvip.fit/')">TÀI XỈU MD5</button>
            </div>
        </div>
        
        <div class="glass" style="padding: 10px;">
            <div class="cate-title" style="font-size:12px;">CỔNG LC79.BET</div>
            <div class="grid-2" style="margin-bottom: 8px;">
                <button class="btn" onclick="switchTool('lc79_tx', 'LC79 TÀI XỈU', 'https://lc79.bet')">TÀI XỈU HŨ</button>
                <button class="btn btn-dark" onclick="switchTool('lc79_md5', 'LC79 MD5', 'https://lc79.bet')">TÀI XỈU MD5</button>
            </div>
            <button class="btn btn-red" onclick="switchTool('lc79_xd', 'LC79 XÓC ĐĨA', 'https://lc79.bet')">XÓC ĐĨA CHẴN LẺ</button>
        </div>
        
        <button class="btn btn-dark" id="btn-admin" style="display:none; margin-top:15px; border-color:var(--cyan); color:var(--cyan);" onclick="document.getElementById('admin-modal').style.display='flex'"><i class="fas fa-cogs"></i> QUẢN LÝ KEY</button>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box glass" style="max-width: 350px; padding:15px;">
            <div style="position:absolute; top:5px; right:10px; color:#fff; font-size:18px; cursor:pointer;" onclick="this.parentElement.parentElement.style.display='none'">×</div>
            <h3 style="color:var(--gold); margin-bottom:10px; font-size:14px;">TẠO CHÌA KHÓA VIP</h3>
            <input type="text" id="custom-key-input" class="input-box" placeholder="Tên Key (Trống = Random)">
            <select id="key-duration" class="input-box"><option value="1H">1 Giờ</option><option value="1D">1 Ngày</option><option value="3D">3 Ngày</option><option value="30D">30 Ngày</option></select>
            <button class="btn" onclick="adminCreateKey()">CẤP QUYỀN KEY</button>
            <div id="admin-keys" style="margin-top:10px; text-align:left; max-height:150px; overflow-y:auto;"></div>
        </div>
    </div>
    <script>
        let currentKey = localStorage.getItem("royal_key") || ""; 
        let scanInterval; let phienCu = ""; let activeGame = ""; 
        let isPredicting = false; let countdownTimer;
        let targetWin = 5, targetLose = 3, currentWin = 0, currentLose = 0, isLockKpi = false;
        let isVoiceOn = true;

        function speak(text) {
            if(!isVoiceOn) return;
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'vi-VN'; msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            document.getElementById('btn-voice').className = isVoiceOn ? "fas fa-volume-up voice-toggle" : "fas fa-volume-mute voice-toggle";
            if(isVoiceOn) speak("Bật âm thanh");
        }

        let stealthClicks = 0;
        function toggleStealth() {
            stealthClicks++;
            if(stealthClicks >= 3) { document.getElementById('stealth-overlay').style.display = 'block'; stealthClicks = 0; }
            setTimeout(() => stealthClicks = 0, 2000);
        }
        document.getElementById('stealth-overlay').addEventListener('click', function(e) {
            if(e.clientX > window.innerWidth - 100 && e.clientY > window.innerHeight - 100) {
                stealthClicks++;
                if(stealthClicks >= 3) { this.style.display = 'none'; stealthClicks = 0; }
                setTimeout(() => stealthClicks = 0, 2000);
            }
        });

        if(currentKey) { document.getElementById('auth-key').value = currentKey; verifyKey(true); }

        async function verifyKey(isAuto = false) {
            let k = document.getElementById('auth-key').value.trim();
            if(!k) return document.getElementById('auth-msg').innerText = "Nhập Key bảo mật!";
            if(!isAuto) document.getElementById('auth-msg').innerText = "Đang xác thực...";
            
            setTimeout(async () => {
                try {
                    let res = await fetch('/api/verify_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({key: k})});
                    let json = await res.json();
                    if (json.status === "success") {
                        currentKey = k; localStorage.setItem("royal_key", currentKey); 
                        document.getElementById('auth-wrapper').style.display = 'none'; 
                        document.getElementById('main-header').style.display = 'flex'; 
                        document.getElementById('main-dashboard').style.display = 'block';
                        if(json.role === "admin") { document.getElementById('btn-admin').style.display = 'block'; loadAdminData(); }
                        if(!isAuto) speak("Vào hệ thống");
                    } else { 
                        if(!isAuto) document.getElementById('auth-msg').innerText = json.msg;
                        else { localStorage.removeItem("royal_key"); currentKey = ""; }
                    }
                } catch(e) { if(!isAuto) document.getElementById('auth-msg').innerText = "Lỗi mạng!"; }
            }, 800);
        }

        function logout() { 
            localStorage.removeItem("royal_key"); currentKey = ""; closeGame();
            document.getElementById('main-header').style.display = 'none'; document.getElementById('main-dashboard').style.display = 'none'; 
            document.getElementById('auth-wrapper').style.display = 'flex'; document.getElementById('auth-key').value = "";
        }

        function switchTool(gameId, toolName, url) {
            targetWin = parseInt(document.getElementById('setup-win').value) || 5;
            targetLose = parseInt(document.getElementById('setup-lose').value) || 3;
            document.getElementById('target-win-show').innerText = targetWin;
            document.getElementById('target-lose-show').innerText = targetLose;
            currentWin = 0; currentLose = 0; isLockKpi = false;
            document.getElementById('live-win').innerText = "0"; document.getElementById('live-lose').innerText = "0";
            document.getElementById('victory-screen').style.display = 'none';

            if (url !== '') document.getElementById('game-frame').src = url;
            activeGame = gameId; phienCu = ""; isPredicting = false; clearInterval(scanInterval);
            clearInterval(countdownTimer); document.getElementById('timer-15s').style.display = 'none';
            
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('robo-phien').innerText = "ĐANG TẢI...";
            document.getElementById('robo-advice').innerText = "KẾT NỐI API...";
            document.getElementById('left-history-content').innerHTML = '<i style="color:#777;">Đang lấy dữ liệu...</i>';
            
            document.getElementById('box-tai').innerText = (gameId === 'lc79_xd') ? "CHẴN" : "TÀI";
            document.getElementById('box-xiu').innerText = (gameId === 'lc79_xd') ? "LẺ" : "XỈU";
            
            resetBoxes();
            speak("Đã mở " + toolName);
            getSignalTX(); scanInterval = setInterval(getSignalTX, 2000);
        }

        function closeGame() {
            activeGame = ""; phienCu = ""; clearInterval(scanInterval); clearInterval(countdownTimer); isPredicting = false;
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
        
        function resetBoxes() {
            document.getElementById('box-tai').classList.remove('active');
            document.getElementById('box-xiu').classList.remove('active');
        }

        function start15sTimer() {
            clearInterval(countdownTimer);
            let timeLeft = 15;
            let timerEl = document.getElementById('timer-15s');
            timerEl.style.display = 'block';
            timerEl.innerText = timeLeft + "s";
            
            countdownTimer = setInterval(() => {
                timeLeft--;
                if(timeLeft >= 0) {
                    timerEl.innerText = timeLeft + "s";
                } else {
                    clearInterval(countdownTimer); timerEl.style.display = 'none'; resetBoxes();
                    document.getElementById('robo-advice').innerText = "CHỜ VÁN MỚI...";
                }
            }, 1000);
        }

        async function getSignalTX() {
            if (isPredicting || !activeGame || isLockKpi) return; 
            try {
                let res = await fetch(`/api/scan?tool=${activeGame}&key=${currentKey}`); let json = await res.json();
                if(json.status === "error") { 
                    if(json.msg.includes("đồng bộ")) return; 
                    alert("LỖI: " + json.msg); closeGame(); 
                    if(json.msg.includes("hết hạn") || json.msg.includes("chặn") || json.msg.includes("khóa")) logout();
                    return; 
                }
                
                let data = json.data;
                if(data.phien !== phienCu && data.phien !== "ĐANG TẢI...") {
                    isPredicting = true; 
                    
                    if(phienCu !== "" && data.history && data.history.length > 0) {
                        let latestResult = data.history[0];
                        if(latestResult.phien == phienCu && latestResult.du_doan !== "CHỜ") {
                            if(latestResult.status === "WIN") { currentWin++; document.getElementById('live-win').innerText = currentWin;}
                            else { currentLose++; document.getElementById('live-lose').innerText = currentLose; }
                            
                            if(currentWin >= targetWin || currentLose >= targetLose) {
                                isLockKpi = true; document.getElementById('victory-screen').style.display = 'flex';
                                speak("Mục tiêu hoàn thành. Đã khóa."); return;
                            }
                        }
                    }

                    phienCu = data.phien; 
                    document.getElementById('robo-phien').innerText = data.phien; 
                    
                    // CẬP NHẬT BẢNG LỊCH SỬ GÓC TRÁI (Lấy 8 ván gần nhất)
                    if(data.history && data.history.length > 0) {
                        let htmlHist = "";
                        let histToDisplay = data.history.slice(0, 8);
                        histToDisplay.forEach(h => {
                            if(h.du_doan === "CHỜ") return;
                            let colorClass = h.status === "WIN" ? "hist-win" : "hist-lose";
                            htmlHist += `<div class="hist-row"><span>#${h.phien.toString().slice(-4)}</span> <span>${h.du_doan}</span> <span class="${colorClass}">${h.status}</span></div>`;
                        });
                        document.getElementById('left-history-content').innerHTML = htmlHist;
                    }

                    resetBoxes();
                    document.getElementById('timer-15s').style.display = 'none';
                    clearInterval(countdownTimer);
                    document.getElementById('robo-advice').innerText = "AI ĐANG TÍNH...";

                    setTimeout(() => {
                        let result = data.du_doan;
                        document.getElementById('robo-advice').innerText = data.ti_le + "% | " + data.loi_khuyen;
                        
                        if(result === "CHỜ") {
                            speak("Cầu loạn, nằm im.");
                        } else {
                            if(result === "TÀI" || result === "CHẴN") document.getElementById('box-tai').classList.add('active');
                            else document.getElementById('box-xiu').classList.add('active');
                            speak("Đánh " + result);
                            start15sTimer();
                        }
                        isPredicting = false; 
                    }, 3000);
                }
            } catch (e) {}
        }

        async function loadAdminData() { 
            let res = await fetch(`/api/admin/list_keys?admin_key=${currentKey}`); let json = await res.json(); 
            if(json.status !== "success") return; 
            let htmlKeys = ""; 
            json.keys.forEach(k => { 
                let btn = k[2] == 0 ? `<button class="btn" style="padding:2px; font-size:9px; margin:0; width:40px; border-color:var(--red); color:var(--red); background:none;" onclick="actionKey('${k[0]}','ban')">KHÓA</button>` : `<button class="btn" style="padding:2px; font-size:9px; margin:0; width:40px; border-color:var(--cyan); color:var(--cyan); background:none;" onclick="actionKey('${k[0]}','unban')">MỞ</button>`;
                htmlKeys += `<div style="border-bottom:1px solid rgba(255,215,0,0.2); padding:5px 0;"><div style="display:flex; justify-content:space-between; align-items:center;"><b style="color:var(--gold); font-size:10px;">${k[0]}</b>${btn}</div><div style="font-size:9px; color:#aaa;">HSD: ${k[1]}</div><button class="btn" style="padding:2px; font-size:9px; margin-top:3px; width:100%; border-color:#555; background:none; color:#fff;" onclick="actionKey('${k[0]}','delete')">XÓA</button></div>`; 
            }); 
            document.getElementById('admin-keys').innerHTML = htmlKeys || "<i style='color:#555;'>Trống.</i>"; 
        }

        async function adminCreateKey() {
            let dur = document.getElementById('key-duration').value; let customK = document.getElementById('custom-key-input').value.trim();
            let res = await fetch('/api/admin/create_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, duration: dur, custom_key: customK}) });
            let json = await res.json();
            if(json.status === "success") { prompt("Copy Key:", json.new_key); document.getElementById('custom-key-input').value = ""; loadAdminData(); } 
            else alert("Lỗi: " + json.msg);
        }

        async function actionKey(target, act) { 
            if(act === 'delete' && !confirm("Xóa vĩnh viễn?")) return;
            await fetch('/api/admin/action_key', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({admin_key: currentKey, target_key: target, action: act})}); loadAdminData(); 
        }
        dragElement(document.getElementById("draggable-robot"));
        function dragElement(elmnt) {
            var pos1=0, pos2=0, pos3=0, pos4=0; var img = elmnt.querySelector('.robo-dialog'); 
            img.onmousedown = dragMouseDown; img.ontouchstart = dragTouchStart;
            function dragMouseDown(e) { e = e || window.event; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function dragTouchStart(e) { pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; document.ontouchend = closeDragElement; document.ontouchmove = elementTouchDrag; }
            function elementDrag(e) { e = e || window.event; e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function elementTouchDrag(e) { pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY; pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }
    </script>
</body>
</html>
